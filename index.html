        ? `Tu es un professeur de français expert qui enseigne à une apprenante thaïlandaise (niveau A1–B1).

Crée UN exercice QCM (4 choix) qui teste EXACTEMENT ce point de la leçon "${lesson.title}" :
→ ${chosenFocus}

Variation #${variationSeed} — sois original, utilise des scénarios de vie quotidienne variés.

Règles strictes :
1. question : une phrase ou situation courte et claire en français qui pose le problème.
2. options : exactement 4 réponses courtes en français. Une seule est correcte, les 3 autres sont des distracteurs plausibles qui reprennent des erreurs courantes sur CE point précis.
3. correct_index : l'index (0 à 3) de la bonne réponse dans le tableau options.
4. consigne_th : instruction en thaïlandais — explique ce qu'on demande de choisir.
5. explication_th : explication pédagogique en thaïlandais — pourquoi CETTE option est correcte et la règle derrière.

Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ni après, sans backticks :
{"type":"qcm","consigne_th":"...","question":"...","options":["...","...","...","..."],"correct_index":0,"explication_th":"..."}`
        : `Tu es un professeur de français expert qui enseigne à une apprenante thaïlandaise (niveau A1–B1).

Crée UN exercice "texte à trous" qui teste EXACTEMENT ce point de la leçon "${lesson.title}" :
→ ${chosenFocus}

L'exercice doit vérifier que l'apprenante a bien compris CE point précis, pas autre chose.
Variation #${variationSeed} — sois original, évite les phrases trop connues ou répétitives.

Règles strictes :
1. La phrase est naturelle, correcte en français, et illustre parfaitement le point ciblé.
2. phrase_avant = tout ce qui précède le trou (chaîne vide "" si le trou est en début de phrase).
3. phrase_apres = tout ce qui suit le trou (chaîne vide "" si le trou est en fin de phrase).
4. reponse_attendue = la réponse principale (forme canonique, celle qu'on affiche en correction).
5. reponses_acceptees = tableau de TOUTES les formes correctes acceptables pour ce trou (ex: "du" ET "de l'" si les deux conviennent, formes masculin/féminin si les deux sont possibles, contractions équivalentes…). Doit contenir au minimum reponse_attendue.
6. consigne_th : instruction claire en thaïlandais, dis exactement ce qu'on cherche à compléter.
7. explication_th : explication pédagogique en thaïlandais — explique POURQUOI c'est cette réponse et la règle derrière.

Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ni après, sans backticks :
{"consigne_th":"...","phrase_avant":"...","reponse_attendue":"...","reponses_acceptees":["...","..."],"phrase_apres":"...","explication_th":"..."}`;

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.85, maxOutputTokens: 1024 }
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `Erreur HTTP ${res.status}`);
        }

        const data = await res.json();
        state.lastRawResponse = data;
        document.getElementById('debug-btn').classList.add('visible');

        let raw = data.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
        if (!raw) throw new Error('Réponse vide de l\'IA.');

        // Strip possible markdown fences
        raw = raw.trim().replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/i, '').trim();

        const exercise = JSON.parse(raw);
        state.currentExercise = exercise;
        renderExercise(exercise, lessonId);

    } catch (err) {
        console.error(err);
        showError(err.message, lessonId);
    }
}

    zone.innerHTML = `

    setTimeout(() => document.getElementById('answer-input')?.focus(), 120);

// ============================================================
// VALIDATE
// ============================================================
function validateAnswer() {
    if (state.hasValidated) return;

    const input    = document.getElementById('answer-input');
    const resultZ  = document.getElementById('result-zone');
    const newExZ   = document.getElementById('new-ex-zone');
    const valBtn   = document.getElementById('validate-btn');
    const exercise = state.currentExercise;
    if (!input || !exercise) return;

    const userAnswer = input.value.trim();
    if (!userAnswer) {
        input.style.borderColor = '#EF4444';
        input.placeholder = 'Écris ta réponse !';
        setTimeout(() => { input.style.borderColor = '#0071E3'; input.placeholder = '...'; }, 1600);
        return;
    }

    state.hasValidated = true;

    const normalize = str =>
        str.toLowerCase().trim()
           .normalize('NFD').replace(/[̀-ͯ]/g, '')
           .replace(/['']/g, "'");

    const accepted = (exercise.reponses_acceptees && exercise.reponses_acceptees.length)
        ? exercise.reponses_acceptees
        : [exercise.reponse_attendue];
    const correct = accepted.some(r => normalize(userAnswer) === normalize(r));
    const mainAnswer = exercise.reponse_attendue;

    input.disabled = true;

    const fullSentence = escapeHtml((exercise.phrase_avant || '') + mainAnswer + (exercise.phrase_apres || ''));
    const fullWithHighlight =
        escapeHtml(exercise.phrase_avant || '') +
        `<span class="text-green-700 font-bold">${escapeHtml(mainAnswer)}</span>` +
        escapeHtml(exercise.phrase_apres || '');

    const altAnswers = accepted.filter(r => normalize(r) !== normalize(mainAnswer));
    const altHtml = altAnswers.length
        ? `<p class="text-green-600 text-sm mt-1">Aussi accepté : ${altAnswers.map(r => `<strong>${escapeHtml(r)}</strong>`).join(', ')}</p>`
        : '';

    const wrongAltHtml = accepted.length > 1
        ? `<p class="text-red-700 text-sm mt-1">Réponses acceptées : ${accepted.map(r => `<strong>${escapeHtml(r)}</strong>`).join(', ')}</p>`
        : `<p class="text-red-800 text-sm font-semibold mt-1">Bonne réponse : <strong>${escapeHtml(mainAnswer)}</strong></p>`;

    if (correct) {
        input.style.borderColor = '#22C55E';
        input.style.background = '#F0FDF4';
        input.style.color = '#15803D';
        valBtn.className = 'w-full bg-green-500 text-white font-semibold py-3.5 rounded-2xl text-[14px] cursor-default';
        valBtn.textContent = '🎉 Correct !';

        resultZ.innerHTML = `
            <div class="animate-in space-y-3">
                <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="text-2xl">🎉</span>
                        <span class="font-bold text-green-800 text-[15px]">Excellent ! Bonne réponse !</span>
                    </div>
                    <p class="text-green-700 text-sm">La réponse : <strong class="text-green-900">${escapeHtml(mainAnswer)}</strong></p>
                    ${altHtml}
                </div>
                <div class="bg-[#F5F5F7] rounded-2xl px-4 py-3.5">
                    <p class="text-[10.5px] font-bold uppercase tracking-widest text-[#9CA3AF] mb-1.5">Phrase complète</p>
                    <p class="text-[#1D1D1F] text-[15px] leading-relaxed">${fullSentence}</p>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                    <div class="flex items-start gap-2.5">
                        <span class="text-xl mt-0.5 flex-shrink-0">📖</span>
                        <div>
                            <p class="font-bold text-amber-800 text-[13px] mb-1.5">คำอธิบาย</p>
                            <p class="text-amber-900 thai text-[13.5px] leading-relaxed">${exercise.explication_th}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    } else {
        input.style.borderColor = '#EF4444';
        input.style.background = '#FEF2F2';
        input.style.color = '#B91C1C';
        valBtn.className = 'w-full bg-red-500 text-white font-semibold py-3.5 rounded-2xl text-[14px] cursor-default';
        valBtn.textContent = '✗ Pas tout à fait…';

        resultZ.innerHTML = `
            <div class="animate-in space-y-3">
                <div class="bg-red-50 border border-red-200 rounded-2xl p-4">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="text-2xl">💪</span>
                        <span class="font-bold text-red-800 text-[15px]">Presque ! Continue comme ça.</span>
                    </div>
                    <p class="text-red-600 text-sm mb-0.5">Ta réponse : <span class="line-through text-red-400">${escapeHtml(userAnswer)}</span></p>
                    ${wrongAltHtml}
                </div>
                <div class="bg-[#F5F5F7] rounded-2xl px-4 py-3.5">
                    <p class="text-[10.5px] font-bold uppercase tracking-widest text-[#9CA3AF] mb-1.5">Phrase correcte</p>
                    <p class="text-[#1D1D1F] text-[15px] leading-relaxed">${fullWithHighlight}</p>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                    <div class="flex items-start gap-2.5">
                        <span class="text-xl mt-0.5 flex-shrink-0">📖</span>
                        <div>
                            <p class="font-bold text-amber-800 text-[13px] mb-1.5">คำอธิบาย</p>
                            <p class="text-amber-900 thai text-[13.5px] leading-relaxed">${exercise.explication_th}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    resultZ.classList.remove('hidden');
    newExZ.classList.remove('hidden');

    setTimeout(() => resultZ.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);
}

function selectQcmOption(chosenIndex) {
    if (state.hasValidated) return;
    state.hasValidated = true;

    const exercise = state.currentExercise;
    const correct  = chosenIndex === exercise.correct_index;
    const resultZ  = document.getElementById('result-zone');
    const newExZ   = document.getElementById('new-ex-zone');

    // Style each option button
    exercise.options.forEach((_, i) => {
        const btn    = document.getElementById(`qcm-opt-${i}`);
        const letter = btn?.querySelector('.qcm-letter');
        if (!btn) return;
        btn.disabled = true;
        btn.classList.remove('hover:border-[#0071E3]', 'btn-press');
        if (i === exercise.correct_index) {
            btn.classList.replace('border-gray-200', 'border-green-400');
            btn.classList.add('bg-green-50');
            if (letter) { letter.classList.remove('bg-[#F5F5F7]', 'text-[#6E6E73]'); letter.classList.add('bg-green-500', 'text-white'); }
        } else if (i === chosenIndex) {
            btn.classList.replace('border-gray-200', 'border-red-400');
            btn.classList.add('bg-red-50');
            if (letter) { letter.classList.remove('bg-[#F5F5F7]', 'text-[#6E6E73]'); letter.classList.add('bg-red-400', 'text-white'); }
        }
    });

    const correctText  = escapeHtml(exercise.options[exercise.correct_index]);
    const chosenText   = escapeHtml(exercise.options[chosenIndex]);

    resultZ.innerHTML = correct
        ? `<div class="animate-in space-y-3">
                <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="text-2xl">🎉</span>
                        <span class="font-bold text-green-800 text-[15px]">Excellent ! Bonne réponse !</span>
                    </div>
                    <p class="text-green-700 text-sm">La bonne réponse : <strong class="text-green-900">${correctText}</strong></p>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                    <div class="flex items-start gap-2.5">
                        <span class="text-xl mt-0.5 flex-shrink-0">📖</span>
                        <div>
                            <p class="font-bold text-amber-800 text-[13px] mb-1.5">คำอธิบาย</p>
                            <p class="text-amber-900 thai text-[13.5px] leading-relaxed">${exercise.explication_th}</p>
                        </div>
                    </div>
                </div>
           </div>`
        : `<div class="animate-in space-y-3">
                <div class="bg-red-50 border border-red-200 rounded-2xl p-4">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="text-2xl">💪</span>
                        <span class="font-bold text-red-800 text-[15px]">Presque ! Continue comme ça.</span>
                    </div>
                    <p class="text-red-600 text-sm mb-0.5">Ta réponse : <span class="line-through text-red-400">${chosenText}</span></p>
                    <p class="text-red-800 text-sm font-semibold">Bonne réponse : <strong>${correctText}</strong></p>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                    <div class="flex items-start gap-2.5">
                        <span class="text-xl mt-0.5 flex-shrink-0">📖</span>
                        <div>
                            <p class="font-bold text-amber-800 text-[13px] mb-1.5">คำอธิบาย</p>
                            <p class="text-amber-900 thai text-[13.5px] leading-relaxed">${exercise.explication_th}</p>
                        </div>
                    </div>
                </div>
           </div>`;

    resultZ.classList.remove('hidden');
    newExZ.classList.remove('hidden');
    setTimeout(() => resultZ.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);
}

// TOGGLE LESSON
// ============================================================
function toggleLesson() {
    const body = document.getElementById('lesson-body');
    const chev = document.getElementById('lesson-chevron');
    if (!body) return;
    if (body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        body.style.maxHeight = '9999px';
        chev && chev.classList.add('open');
    } else {
        body.style.maxHeight = body.scrollHeight + 'px';
        requestAnimationFrame(() => {
            body.style.maxHeight = '0';
            body.classList.add('collapsed');
        });
        chev && chev.classList.remove('open');
    }
}

function openSidebar() {

// ============================================================
// UTIL
// ============================================================
function escapeHtml(str) {
    if (!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// ============================================================
// DARK MODE
// ============================================================
function toggleDark() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateDarkIcons(isDark);
}

function updateDarkIcons(isDark) {
    const icon = isDark ? '☀️' : '🌙';
    const bg   = isDark ? 'bg-gray-700' : 'bg-gray-100';
    const bgOld= isDark ? 'bg-gray-100' : 'bg-gray-700';
    document.getElementById('dark-icon')?.replaceChildren(document.createTextNode(icon));
    document.getElementById('dark-icon-mobile')?.replaceChildren(document.createTextNode(icon));
    const btn = document.getElementById('dark-toggle');
    if (btn) { btn.classList.remove(bgOld); btn.classList.add(bg); }
}

(function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
        updateDarkIcons(true);
    }
})();
