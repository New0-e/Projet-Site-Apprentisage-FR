<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรียนภาษาฝรั่งเศส 🇫🇷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background: #F5F5F7; color: #1D1D1F; }
        .thai { font-family: 'Sarabun', sans-serif; }

        /* Sidebar */
        #sidebar { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        #overlay { transition: opacity 0.25s ease; }
        .lesson-btn { transition: background 0.15s ease, color 0.15s ease; }
        .lesson-btn:hover { background: #F5F5F7; }
        .lesson-btn.active { background: rgba(0, 113, 227, 0.09); color: #0071E3; }
        .lesson-btn.active .lesson-title { color: #0071E3; font-weight: 600; }

        /* Animations */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeSlideIn 0.38s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.75s linear infinite; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* Input */
        .answer-input { transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
        .answer-input:focus { outline: none; box-shadow: 0 0 0 3.5px rgba(0,113,227,0.22); border-color: #0071E3; }

        /* Chevron */
        .chevron { transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        .chevron.open { transform: rotate(180deg); }

        /* Phase content */
        .phase-lessons { transition: max-height 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease; overflow: hidden; max-height: 0; opacity: 0; }
        .phase-lessons.open { max-height: 600px; opacity: 1; }

        /* Button press */
        .btn-press:active { transform: scale(0.975); }

        /* Lesson tables */
        .ltable { width:100%; border-collapse:collapse; font-size:13px; }
        .ltable th { background:#F5F5F7; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#6E6E73; padding:7px 12px; text-align:left; }
        .ltable td { padding:8px 12px; border-top:1px solid #F0F0F0; vertical-align:top; }
        .ltable tr:first-child td { border-top:none; }
        .ltable .fr { font-weight:600; color:#1D1D1F; }
        .ltable .th { font-family:'Sarabun',sans-serif; color:#4B5563; }
        .ltable .note { font-size:11px; color:#9CA3AF; font-style:italic; }
        .rule-box { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:14px; padding:12px 14px; }
        .tip-box  { background:#FFF7ED; border:1px solid #FED7AA; border-radius:14px; padding:12px 14px; }
        .ex-box   { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:14px; padding:12px 14px; }
        .sec-head { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#9CA3AF; margin-bottom:8px; }

        /* Lesson collapsible */
        .lesson-body { transition: max-height .4s cubic-bezier(.16,1,.3,1), opacity .3s ease; overflow:hidden; }
        .lesson-body.collapsed { max-height:0 !important; opacity:0; }

        /* Debug modal */
        #debug-modal { display:none; }
        #debug-modal.open { display:flex; }
        #debug-btn { opacity:0; pointer-events:none; transition:opacity .2s; }
        #debug-btn.visible { opacity:1; pointer-events:auto; }

        /* ===== DARK MODE ===== */
        html { transition: background 0.2s; }
        body { transition: background 0.2s, color 0.2s; }

        .dark body { background: #1C1C1E; color: #F5F5F7; }

        /* Sidebar */
        .dark #sidebar { background: rgba(28,28,30,0.97); border-color: rgba(255,255,255,0.07) !important; }
        .dark .lesson-btn:hover { background: rgba(255,255,255,0.06); }
        .dark .lesson-btn.active { background: rgba(0,113,227,0.22); }
        .dark .lesson-btn .lesson-title,
        .dark #lessons-nav [class*="font-semibold"] { color: #E5E5EA !important; }
        .dark #lessons-nav [class*="text-\[\#6E6E73\]"] { color: #636366 !important; }
        .dark #lessons-nav [class*="text-\[\#1D1D1F\]"] { color: #E5E5EA !important; }
        .dark #lessons-nav button:hover [class*="text-\[\#1D1D1F\]"] { color: #F5F5F7 !important; }
        .dark #sidebar [class*="border-gray-100"] { border-color: rgba(255,255,255,0.07) !important; }
        .dark #sidebar p { color: #636366; }

        /* Mobile header */
        .dark header { background: rgba(28,28,30,0.94) !important; border-color: rgba(255,255,255,0.07) !important; }
        .dark header span { color: #F5F5F7; }
        .dark header svg { color: #A1A1AA !important; }

        /* Main area */
        .dark .lg\:ml-72 { background: #1C1C1E; }

        /* Welcome screen cards */
        .dark .bg-white { background: #2C2C2E !important; }
        .dark [class*="border-gray-100"] { border-color: rgba(255,255,255,0.08) !important; }
        .dark [class*="text-\[\#1D1D1F\]"] { color: #F5F5F7 !important; }
        .dark [class*="text-\[\#6E6E73\]"] { color: #98989E !important; }

        /* Scrollbar */
        .dark ::-webkit-scrollbar-thumb { background: #48484A; }

        /* Tables */
        .dark .ltable th { background: #2C2C2E; color: #636366; }
        .dark .ltable td { border-color: rgba(255,255,255,0.07); }
        .dark .ltable .fr { color: #F5F5F7; }
        .dark .ltable .th { color: #A1A1AA; }
        .dark .ltable .note { color: #636366; }

        /* Content boxes */
        .dark .rule-box { background: #0D1F2D; border-color: #1E3A5F; }
        .dark .rule-box p, .dark .rule-box td, .dark .rule-box th { color: #93C5FD !important; }
        .dark .rule-box .fr { color: #BAE6FD !important; }
        .dark .rule-box .note { color: #60A5FA !important; }
        .dark .rule-box strong { color: #BAE6FD !important; }

        .dark .tip-box { background: #1F1500; border-color: #713F12; }
        .dark .tip-box p, .dark .tip-box td { color: #FDE68A !important; }
        .dark .tip-box strong { color: #FCD34D !important; }
        .dark .tip-box .sec-head { color: #D97706 !important; }

        .dark .ex-box { background: #0A1F12; border-color: #14532D; }
        .dark .ex-box p, .dark .ex-box span, .dark .ex-box td { color: #A7F3D0 !important; }
        .dark .ex-box .sec-head { color: #34D399 !important; }
        .dark .ex-box strong { color: #6EE7B7 !important; }

        .dark .sec-head { color: #636366 !important; }

        /* Inline letter tiles (lesson 1-1) */
        .dark [style*="background:#F0F4FF"] { background: #0D1F3A !important; }
        .dark [style*="background:#FFF3F0"] { background: #2A0D0D !important; }
        .dark [style*="background:#FFF0F5"] { background: #2A0D20 !important; }
        .dark [style*="background:#F0FFF4"] { background: #0A1F12 !important; }
        .dark [style*="color:#1D1D1F"] { color: #E5E5EA !important; }
        .dark [style*="color:#4B5563"] { color: #98989E !important; }
        .dark [style*="color:#DC2626"] { color: #FCA5A5 !important; }
        .dark [style*="color:#BE185D"] { color: #F9A8D4 !important; }
        .dark [style*="color:#15803D"] { color: #86EFAC !important; }

        /* Misc text colors in lessons */
        .dark .text-gray-700 { color: #D1D1D6 !important; }
        .dark .text-gray-400 { color: #636366 !important; }
        .dark .text-blue-900 { color: #93C5FD !important; }
        .dark .text-amber-900 { color: #FDE68A !important; }
        .dark .text-amber-700 { color: #FCD34D !important; }
        .dark .text-green-800 { color: #6EE7B7 !important; }
        .dark .text-green-900 { color: #A7F3D0 !important; }

        /* Answer input */
        .dark .answer-input { background: #2C2C2E !important; border-color: #48484A !important; color: #F5F5F7 !important; }
        .dark .answer-input::placeholder { color: #636366; }

        /* Exercise result boxes */
        .dark .bg-green-50  { background: #0A1F12 !important; }
        .dark .bg-red-50    { background: #2A0D0D !important; }
        .dark .bg-amber-50  { background: #1F1500 !important; }
        .dark .bg-\[\#F5F5F7\] { background: #2C2C2E !important; }
        .dark .border-green-200 { border-color: #14532D !important; }
        .dark .border-red-200   { border-color: #7F1D1D !important; }
        .dark .border-amber-200 { border-color: #713F12 !important; }
        .dark .text-green-700, .dark .text-green-800 { color: #6EE7B7 !important; }
        .dark .text-red-800     { color: #FCA5A5 !important; }
        .dark .text-red-600     { color: #FCA5A5 !important; }
        .dark .text-red-400     { color: #F87171 !important; }
        .dark .text-amber-800   { color: #FDE68A !important; }
        .dark .text-amber-700   { color: #FCD34D !important; }

        /* QCM buttons */
        .dark .qcm-btn { background: #2C2C2E !important; border-color: #48484A !important; }
        .dark .qcm-btn:hover:not(:disabled) { border-color: #0071E3 !important; }
        .dark .qcm-btn span.text-\[\#1D1D1F\] { color: #F5F5F7 !important; }
        .dark .qcm-letter { background: #3A3A3C !important; color: #A1A1AA !important; }
        .dark .qcm-btn.bg-green-50 { background: #0A1F12 !important; border-color: #14532D !important; }
        .dark .qcm-btn.bg-red-50   { background: #2A0D0D !important; border-color: #7F1D1D !important; }

        /* Dark mode toggle button */
        #dark-toggle { transition: background 0.2s; }
    </style>
</head>

<script>
// ============================================================
// CONFIG — Remplis ta clé API Gemini ici
// ============================================================
const GEMINI_API_KEY = "proxy";

// ============================================================
// CURRICULUM
// ============================================================
const curriculum = [
    {
        id: 1, phase: "Phase 1", title: "Les Bases", titleTh: "พื้นฐานภาษา", icon: "🌱", color: "emerald",
        lessons: [
            { id: "1-1", title: "L'Alphabet et la Prononciation", titleTh: "พยัญชนะและการออกเสียง",
              topic: "the French alphabet and pronunciation, specifically focusing on sounds absent in Thai: the French R (guttural), the French U vowel, and nasal vowels (an/en, on, in/ain, un)" },
            { id: "1-6", title: "Liaisons, Élisions et Voyelles", titleTh: "การเชื่อมเสียงและสระประสม",
              topic: "French élision (je→j', le/la→l', de→d'), liaison rules (linking final consonants to the next vowel: les-z-enfants, vous-z-avez), and essential vowel combinations (eau=o, ou=u, oi=wa, ai=é, eu=oe, ui)" },
            { id: "1-2", title: "Les Salutations et Se présenter", titleTh: "การทักทายและการแนะนำตัว",
              topic: "French greetings (Bonjour, Bonsoir, Salut, Bonne nuit, Au revoir, À bientôt) and self-introduction phrases (Je m'appelle..., J'ai ... ans, Je suis de..., Je suis...)" },
            { id: "1-3", title: "Tu ou Vous — La Politesse", titleTh: "การใช้ Tu และ Vous",
              topic: "the sociolinguistic distinction between Tu (informal, with friends/family/peers) and Vous (formal, with strangers/elders/authority figures), with clear examples and context" },
            { id: "1-5", title: "Les Pronoms Sujets", titleTh: "สรรพนามบุรุษ",
              topic: "the eight French subject pronouns: Je, Tu, Il, Elle, On, Nous, Vous, Ils, Elles — their meaning and how to choose the right one" },
            { id: "1-4", title: "Les Nombres (0 – 1000)", titleTh: "ตัวเลข (0–1000)",
              topic: "French numbers: 0–20 (irregular), 21–69, then the tricky 70 (soixante-dix), 80 (quatre-vingts), 90 (quatre-vingt-dix), up to 1000" },
            { id: "1-7", title: "Phrases de Survie", titleTh: "ประโยคอยู่รอด",
              topic: "essential survival phrases for a beginner in France: Je ne comprends pas, Pouvez-vous répéter, emergency numbers (15/17/18/112), asking for help, pharmacy basics" },
        ]
    },
    {
        id: 2, phase: "Phase 2", title: "Les Articles", titleTh: "คำนำหน้านาม", icon: "📖", color: "blue",
        lessons: [
            { id: "2-1", title: "Les Articles et le Genre (Le/La, Un/Une)", titleTh: "คำนำหน้าและเพศของคำนาม",
              topic: "definite articles (le, la, l', les) and indefinite articles (un, une, des), and how grammatical gender (masculine/feminine) is assigned to French nouns" },
            { id: "2-5", title: "Les Articles Partitifs (du, de la, de l')", titleTh: "คำนำหน้าแสดงปริมาณ",
              topic: "French partitive articles: du (de+le), de la, de l', des — used for uncountable or partial quantities like food/drinks. Key negation rule: all become de/d' after pas. Full contrast table with definite (le/la) and indefinite (un/une) articles." },
        ]
    },
    {
        id: 3, phase: "Phase 3", title: "Les Conjugaisons", titleTh: "การผันกริยา", icon: "⚙️", color: "violet",
        lessons: [
            { id: "2-2", title: "Être, Avoir, Aller — Les Verbes Essentiels", titleTh: "กริยาพื้นฐานที่สำคัญที่สุด",
              topic: "full conjugation in the present tense of the three most essential French verbs: Être (to be), Avoir (to have), Aller (to go), with typical usage examples" },
            { id: "3-1", title: "Le Présent — Verbes en -ER, -IR, -RE", titleTh: "กาลปัจจุบัน (กริยาสม่ำเสมอ)",
              topic: "present tense conjugation of regular French verbs: -ER group (parler, manger, aimer), -IR group (finir, choisir), -RE group (vendre, attendre, répondre)" },

            { id: "3-3", title: "Les Verbes Pronominaux — La Routine", titleTh: "กริยาสะท้อน (se lever, se laver…)",
              topic: "French reflexive/pronominal verbs for daily routines: se lever, se réveiller, se laver, s'habiller, se coucher, se brosser les dents — with reflexive pronoun placement" },
            { id: "4-2", title: "Les Verbes Modaux — Vouloir, Pouvoir, Devoir", titleTh: "กริยาช่วย (vouloir, pouvoir…)",

            { id: "3-2", title: "La Négation (Ne…pas, Ne…jamais…)", titleTh: "การสร้างประโยคปฏิเสธ",
              topic: "French negation structures: ne...pas (not), ne...jamais (never), ne...plus (no longer), ne...rien (nothing), ne...personne (nobody) — placement around the verb" },
        ]
    },
    {
        id: 4, phase: "Phase 4", title: "Les Temps", titleTh: "กาลและเวลา", icon: "⏳", color: "rose",
        lessons: [
            { id: "5-1", title: "Le Passé Composé", titleTh: "อดีตกาล (avoir/être + participe passé)",
              topic: "the French passé composé: formation with auxiliary avoir or être + past participle, agreement rules with être, and how to use it for completed past events (J'ai mangé, Je suis allé...)" },
            { id: "5-2", title: "L'Imparfait — Introduction", titleTh: "อดีตกาลแบบต่อเนื่อง",

            { id: "5-3", title: "Le Futur Proche et le Futur Simple", titleTh: "อนาคตกาล",

            { id: "6-1", title: "Le Conditionnel de Politesse", titleTh: "กาลปัจจุบันสมมุติ (Je voudrais…)",
              topic: "using the French conditional for polite requests: Je voudrais... (I would like), Pourriez-vous...? (Could you...?), Il faudrait... — contrasted with the blunt present tense" },
        ]
    },
    {
        id: 5, phase: "Phase 5", title: "La Grammaire", titleTh: "ไวยากรณ์", icon: "📐", color: "amber",
        lessons: [

"1-3": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ในภาษาฝรั่งเศส "คุณ" มีสองแบบ: <strong>tu</strong> ใช้กับคนที่สนิท และ <strong>vous</strong> ใช้กับคนที่ไม่สนิทหรือผู้ใหญ่ การเลือกผิดอาจทำให้ดูหยาบคายหรืออึดอัดได้</p><p class="text-[12px] text-amber-700 mt-1 italic">Choisir entre "tu" et "vous" est une règle sociale très importante en France.</p></div>

  <div class="rule-box"><p class="sec-head">📌 กฎการใช้งาน</p>
  <table class="ltable"><thead><tr><th>Pronom</th><th class="thai">ใช้กับ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">TU<br><span class="note">ไม่เป็นทางการ</span></td><td class="th">• เพื่อน / เพื่อนร่วมชั้น<br>• สมาชิกในครอบครัว<br>• เด็ก (อายุต่ำกว่า 15)<br>• สัตว์เลี้ยง</td><td class="note">Tu viens ce soir ?<br>(คืนนี้มาไหม?)</td></tr>
  <tr><td class="fr">VOUS<br><span class="note">เป็นทางการ / พหูพจน์</span></td><td class="th">• คนที่ไม่รู้จัก<br>• ผู้สูงอายุ<br>• หัวหน้า / ครู / ลูกค้า<br>• สถานการณ์ทางการ<br>• พูดกับหลายคน</td><td class="note">Vous parlez français ?<br>(คุณพูดภาษาฝรั่งเศสไหม?)</td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่าง</p>
  <p class="text-[13px]"><strong>Tu t'appelles comment ?</strong> <span class="thai text-[12.5px] text-green-800">(ถามเพื่อน) — คุณชื่ออะไร?</span></p>
  <p class="text-[13px] mt-1.5"><strong>Comment vous appelez-vous ?</strong> <span class="thai text-[12.5px] text-green-800">(ถามผู้ใหญ่) — คุณชื่ออะไร?</span></p>
  <p class="text-[13px] mt-1.5"><strong>Vous avez une table pour deux ?</strong> <span class="thai text-[12.5px] text-green-800">(ในร้านอาหาร) — มีโต๊ะสำหรับสองคนไหม?</span></p></div>

  <div><p class="sec-head">💡 เคล็ดลับ</p><p class="thai text-[13px] text-gray-700">หากไม่แน่ใจ → ใช้ <strong>vous</strong> ปลอดภัยกว่าเสมอ! ชาวฝรั่งเศสจะบอกเองว่า "On peut se tutoyer ?" (เราใช้ tu ได้นะ)</p></div>
</div>`,

"1-4": `

  <tr><td class="fr">99 = quatre-vingt-dix-neuf</td><td class="note">4×20 + 19</td><td class="th">สี่คูณยี่สิบบวกสิบเก้า</td></tr>

"2-1": `

  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ในภาษาฝรั่งเศส คำนามทุกคำมีเพศ — เพศชาย (masculin) หรือเพศหญิง (féminin) ไม่มีเพศกลาง! และต้องใส่ "คำนำหน้า" ให้ถูกเพศ ถือเป็นหัวใจของภาษาฝรั่งเศส</p></div>

  <div><p class="sec-head">📖 คำนำหน้าแน่นอน — Articles définis (= the)</p>
  <table class="ltable"><thead><tr><th>Article</th><th class="thai">ใช้กับ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">le</td><td class="th">คำนามเพศชาย เอกพจน์</td><td class="note">le livre (หนังสือ)</td></tr>
  <tr><td class="fr">la</td><td class="th">คำนามเพศหญิง เอกพจน์</td><td class="note">la table (โต๊ะ)</td></tr>
  <tr><td class="fr">l'</td><td class="th">หน้าคำที่ขึ้นต้นด้วยสระ (ทั้งสองเพศ)</td><td class="note">l'ami, l'école</td></tr>
  <tr><td class="fr">les</td><td class="th">พหูพจน์ (ทั้งสองเพศ)</td><td class="note">les livres, les tables</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📖 คำนำหน้าไม่แน่นอน — Articles indéfinis (= a/an)</p>
  <table class="ltable"><thead><tr><th>Article</th><th class="thai">ใช้กับ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">un</td><td class="th">คำนามเพศชาย เอกพจน์</td><td class="note">un chat (แมว)</td></tr>
  <tr><td class="fr">une</td><td class="th">คำนามเพศหญิง เอกพจน์</td><td class="note">une fleur (ดอกไม้)</td></tr>
  <tr><td class="fr">des</td><td class="th">พหูพจน์ (ทั้งสองเพศ)</td><td class="note">des chats, des fleurs</td></tr>

  <div class="rule-box"><p class="sec-head">💡 คำใบ้เรื่องเพศ (ไม่มีกฎแน่นอน แต่มีแนวโน้ม!)</p>
  <table class="ltable"><thead><tr><th class="thai">มักเป็นเพศหญิง</th><th class="thai">มักเป็นเพศชาย</th></tr></thead><tbody>

"2-2": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">กริยาสามตัวนี้สำคัญที่สุดในภาษาฝรั่งเศส ต้องจำให้ขึ้นใจ! ใช้ทุกวันในทุกประโยค เป็นรากฐานของภาษาทั้งหมด</p></div>

  <div><p class="sec-head">🔵 ÊTRE = เป็น / อยู่ / คือ</p>
  <table class="ltable"><thead><tr><th>Pronom</th><th>Conjugaison</th><th class="thai">ตัวอย่าง</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">suis</td><td class="th">Je suis thaïlandaise. (ฉันเป็นคนไทย)</td></tr>
  <tr><td>Tu</td><td class="fr">es</td><td class="th">Tu es gentil. (คุณใจดี)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">est</td><td class="th">Il est médecin. (เขาเป็นหมอ)</td></tr>
  <tr><td>Nous</td><td class="fr">sommes</td><td class="th">Nous sommes amis. (เราเป็นเพื่อนกัน)</td></tr>
  <tr><td>Vous</td><td class="fr">êtes</td><td class="th">Vous êtes français ? (คุณเป็นชาวฝรั่งเศสไหม?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">sont</td><td class="th">Elles sont belles. (พวกเธอสวยงาม)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🔴 AVOIR = มี / อายุ</p>
  <table class="ltable"><thead><tr><th>Pronom</th><th>Conjugaison</th><th class="thai">ตัวอย่าง</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">ai</td><td class="th">J'ai faim. (ฉันหิว — มีความหิว)</td></tr>
  <tr><td>Tu</td><td class="fr">as</td><td class="th">Tu as quel âge ? (คุณอายุเท่าไร?)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">a</td><td class="th">Elle a un chat. (เธอมีแมว)</td></tr>
  <tr><td>Nous</td><td class="fr">avons</td><td class="th">Nous avons le temps. (เรามีเวลา)</td></tr>
  <tr><td>Vous</td><td class="fr">avez</td><td class="th">Vous avez une chambre ? (มีห้องพักไหม?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">ont</td><td class="th">Ils ont vingt ans. (พวกเขาอายุยี่สิบปี)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🟢 ALLER = ไป</p>
  <table class="ltable"><thead><tr><th>Pronom</th><th>Conjugaison</th><th class="thai">ตัวอย่าง</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">vais</td><td class="th">Je vais à l'école. (ฉันไปโรงเรียน)</td></tr>
  <tr><td>Tu</td><td class="fr">vas</td><td class="th">Ça va ? (เป็นอย่างไรบ้าง?) Tu vas bien ?</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">va</td><td class="th">On va au restaurant ! (ไปร้านอาหารกัน!)</td></tr>
  <tr><td>Nous</td><td class="fr">allons</td><td class="th">Nous allons en France. (เราไปฝรั่งเศส)</td></tr>
  <tr><td>Vous</td><td class="fr">allez</td><td class="th">Vous allez bien ? (คุณสบายดีไหม?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">vont</td><td class="th">Ils vont à Paris. (พวกเขาไปปารีส)</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">💡 Expressions essentielles avec AVOIR (ใช้ avoir ไม่ใช่ être!)</p>
  <p class="thai text-[12px] text-blue-900 mb-2">ภาษาฝรั่งเศสใช้ "avoir" สำหรับความรู้สึกทางร่างกาย — ต่างจากภาษาไทยและอังกฤษ!</p>
  <table class="ltable"><thead><tr><th>Expression</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">avoir faim</td><td class="th">หิว</td><td class="note">J'ai très faim ! (ฉันหิวมาก!)</td></tr>
  <tr><td class="fr">avoir soif</td><td class="th">กระหาย</td><td class="note">Tu as soif ? (คุณกระหายไหม?)</td></tr>
  <tr><td class="fr">avoir chaud</td><td class="th">รู้สึกร้อน</td><td class="note">J'ai chaud ! (ฉันร้อน!)</td></tr>
  <tr><td class="fr">avoir froid</td><td class="th">รู้สึกหนาว</td><td class="note">Il a froid. (เขาหนาว)</td></tr>
  <tr><td class="fr">avoir sommeil</td><td class="th">ง่วงนอน</td><td class="note">J'ai sommeil. (ฉันง่วงนอน)</td></tr>
  <tr><td class="fr">avoir raison</td><td class="th">พูดถูก/ถูกต้อง</td><td class="note">Tu as raison. (คุณพูดถูก)</td></tr>
  <tr><td class="fr">avoir tort</td><td class="th">พูดผิด/คิดผิด</td><td class="note">J'ai tort. (ฉันผิด)</td></tr>
  <tr><td class="fr">avoir l'air + adj</td><td class="th">ดูเหมือน</td><td class="note">Tu as l'air fatigué. (คุณดูเหนื่อย)</td></tr>
  </tbody></table>
  <p class="thai text-[12px] text-blue-800 mt-2">⚠️ ห้ามใช้ être! ❌ "Je suis faim" → ✅ "<strong>J'ai faim</strong>"</p></div>
</div>`,

"2-3": `

  <tr><td class="note">Base</td><td class="fr">petit</td><td class="fr">petite</td><td class="fr">petits</td><td class="fr">petites</td></tr>
  <tr><td class="note"></td><td class="fr">grand</td><td class="fr">grande</td><td class="fr">grands</td><td class="fr">grandes</td></tr>
  <tr><td class="note">déjà en -e</td><td class="fr">rouge</td><td class="fr">rouge</td><td class="fr">rouges</td><td class="fr">rouges</td></tr>
  <tr><td class="note">irrégulier</td><td class="fr">beau</td><td class="fr">belle</td><td class="fr">beaux</td><td class="fr">belles</td></tr>
  <tr><td class="note">irrégulier</td><td class="fr">bon</td><td class="fr">bonne</td><td class="fr">bons</td><td class="fr">bonnes</td></tr>
  <tr><td class="note">irrégulier</td><td class="fr">vieux</td><td class="fr">vieille</td><td class="fr">vieux</td><td class="fr">vieilles</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📍 ตำแหน่งของคำคุณศัพท์ — Position de l'adjectif</p>
  <table class="ltable"><thead><tr><th class="thai">ส่วนใหญ่ → หลังคำนาม (après le nom)</th><th class="thai">BAGS → หน้าคำนาม (avant le nom)</th></tr></thead><tbody>
  <tr><td class="note">une robe <strong>rouge</strong> (ชุดสีแดง)<br>un chat <strong>noir</strong> (แมวดำ)<br>un homme <strong>intelligent</strong> (ชายฉลาด)</td><td class="note"><strong>B</strong>eau (สวย) / Bon (ดี)<br><strong>A</strong>ncien (เก่า/อดีต)<br><strong>G</strong>rand (ใหญ่) / Gros (อ้วน/ใหญ่)<br><strong>S</strong>: petit (เล็ก), jeune (หนุ่ม/สาว), vieux (แก่), nouveau (ใหม่), joli (สวย)</td></tr>
  <tr><td class="th">คำคุณศัพท์มักอยู่หลังคำนาม</td><td class="note">un <strong>beau</strong> garçon (หนุ่มหล่อ)<br>une <strong>petite</strong> maison (บ้านเล็ก)<br>un <strong>vieux</strong> livre (หนังสือเก่า)</td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่าง</p>
  <p class="text-[13px]"><strong>une belle femme</strong> <span class="thai text-[12.5px] text-green-800">หญิงสาวสวย (belle = หญิง → เปลี่ยนจาก beau)</span></p>
  <p class="text-[13px] mt-1.5"><strong>des chats noirs</strong> <span class="thai text-[12.5px] text-green-800">แมวดำหลายตัว (noirs = ชาย พหูพจน์)</span></p></div>
</div>`,

"3-1": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">กริยาในภาษาฝรั่งเศสแบ่งเป็น 3 กลุ่มตามลงท้าย -ER, -IR, -RE กลุ่ม -ER มีมากที่สุดและสม่ำเสมอที่สุด เรียนให้แม่นก่อนเลย!</p></div>

  <div><p class="sec-head">🔴 กลุ่ม -ER → PARLER (พูด) · กริยา -ER มีมากที่สุด!</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>ลงท้าย<br><span class="note">Terminaison</span></th><th>Parler<br><span class="note">(พูด)</span></th><th class="thai">ตัวอย่างอื่น + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td>-e</td><td class="fr">parle</td><td class="th">mange (กิน), aime (รัก), écoute (ฟัง)</td></tr>
  <tr><td>Tu</td><td>-es</td><td class="fr">parles</td><td class="th">manges, travailles (ทำงาน)</td></tr>
  <tr><td>Il/Elle/On</td><td>-e</td><td class="fr">parle</td><td class="th">mange, arrive (มาถึง)</td></tr>
  <tr><td>Nous</td><td>-ons</td><td class="fr">parlons</td><td class="th">mangeons, regardons (ดู)</td></tr>
  <tr><td>Vous</td><td>-ez</td><td class="fr">parlez</td><td class="th">mangez, habitez (อาศัย)</td></tr>
  <tr><td>Ils/Elles</td><td>-ent<br><span class="note">ไม่ออกเสียง!</span></td><td class="fr">parlent</td><td class="th">mangent, aiment</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🔵 กลุ่ม -IR → FINIR (เสร็จ/จบ)</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>ลงท้าย<br><span class="note">Terminaison</span></th><th>Finir<br><span class="note">(เสร็จ)</span></th><th class="thai">ตัวอย่างอื่น + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td>-is</td><td class="fr">finis</td><td class="th">choisis (เลือก), réussis (สำเร็จ)</td></tr>
  <tr><td>Tu</td><td>-is</td><td class="fr">finis</td><td class="th">choisis</td></tr>
  <tr><td>Il/Elle/On</td><td>-it</td><td class="fr">finit</td><td class="th">choisit, réussit</td></tr>
  <tr><td>Nous</td><td>-issons</td><td class="fr">finissons</td><td class="th">choisissons</td></tr>
  <tr><td>Vous</td><td>-issez</td><td class="fr">finissez</td><td class="th">choisissez</td></tr>
  <tr><td>Ils/Elles</td><td>-issent</td><td class="fr">finissent</td><td class="th">choisissent</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🟢 กลุ่ม -RE → VENDRE (ขาย)</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>ลงท้าย<br><span class="note">Terminaison</span></th><th>Vendre<br><span class="note">(ขาย)</span></th><th class="thai">ตัวอย่างอื่น + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td>-s</td><td class="fr">vends</td><td class="th">réponds (ตอบ), attends (รอ)</td></tr>
  <tr><td>Tu</td><td>-s</td><td class="fr">vends</td><td class="th">réponds, attends</td></tr>
  <tr><td>Il/Elle/On</td><td>— (ไม่มีลงท้าย)</td><td class="fr">vend</td><td class="th">répond, attend</td></tr>
  <tr><td>Nous</td><td>-ons</td><td class="fr">vendons</td><td class="th">répondons, attendons</td></tr>
  <tr><td>Vous</td><td>-ez</td><td class="fr">vendez</td><td class="th">répondez, attendez</td></tr>
  <tr><td>Ils/Elles</td><td>-ent</td><td class="fr">vendent</td><td class="th">répondent, attendent</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">⚠️ สำคัญ</p><p class="thai text-[13px] text-blue-900">-ent ที่ท้ายกริยาพหูพจน์ <strong>ไม่ออกเสียง!</strong><br>ils parlent, ils mangent → ออกเสียงเหมือน "il parle" / "il mange"</p></div>
</div>`,

"3-2": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">การปฏิเสธในภาษาฝรั่งเศสใช้คำสองคำ "หนีบ" กริยา: <strong>ne … pas</strong> อยู่คนละด้านของกริยา ต่างจากภาษาไทยที่ใส่ "ไม่" ไว้ข้างหน้า</p></div>

  <div class="rule-box"><p class="sec-head">📌 โครงสร้าง: Sujet + NE + Verbe + PAS</p>
  <table class="ltable"><thead><tr><th>Affirmatif ✅</th><th>Négatif ❌</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">Je mange.</td><td class="fr">Je <u>ne</u> mange <u>pas</u>.</td><td class="th">ฉันไม่กิน</td></tr>
  <tr><td class="fr">Il parle.</td><td class="fr">Il <u>ne</u> parle <u>pas</u>.</td><td class="th">เขาไม่พูด</td></tr>
  <tr><td class="fr">Nous avons.</td><td class="fr">Nous <u>n'</u>avons <u>pas</u>.</td><td class="th">เราไม่มี (n' ก่อนสระ)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📋 ปฏิเสธแบบต่างๆ</p>
  <table class="ltable"><thead><tr><th>Structure</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">ne … pas</td><td class="th">ไม่</td><td class="note">Je ne dors pas.</td></tr>
  <tr><td class="fr">ne … jamais</td><td class="th">ไม่เคย</td><td class="note">Je ne mange jamais de viande.</td></tr>
  <tr><td class="fr">ne … plus</td><td class="th">ไม่อีกแล้ว</td><td class="note">Il ne travaille plus ici.</td></tr>
  <tr><td class="fr">ne … rien</td><td class="th">ไม่มีอะไร</td><td class="note">Je ne comprends rien.</td></tr>
  <tr><td class="fr">ne … personne</td><td class="th">ไม่มีใคร</td><td class="note">Il ne voit personne.</td></tr>
  <tr><td class="fr">ne … que</td><td class="th">เฉพาะแค่</td><td class="note">Je n'ai que dix euros.</td></tr>
  </tbody></table></div>

  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">การบอกเวลาในภาษาฝรั่งเศสมีเอกลักษณ์! ใช้ระบบ 12 ชั่วโมงในชีวิตประจำวัน และ 24 ชั่วโมงในตารางเวลาทางการ</p></div>

  <div><p class="sec-head">🕐 การบอกเวลา — Dire l'heure</p>
  <table class="ltable"><thead><tr><th>Heure</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">Il est huit heures.</td><td class="th">ตอนนี้ 8 โมง</td></tr>
  <tr><td class="fr">Il est huit heures et quart.</td><td class="th">8 โมง 15 นาที</td></tr>
  <tr><td class="fr">Il est huit heures et demie.</td><td class="th">8 โมงครึ่ง</td></tr>
  <tr><td class="fr">Il est neuf heures moins le quart.</td><td class="th">8 โมง 45 นาที (9 โมงก่อน 15 นาที)</td></tr>
  <tr><td class="fr">Il est midi / minuit.</td><td class="th">เที่ยงวัน / เที่ยงคืน</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📅 วันในสัปดาห์ — Jours de la semaine</p>
  <table class="ltable"><thead><tr><th>Jour</th><th class="thai">ภาษาไทย</th><th>Jour</th><th class="thai">ภาษาไทย</th></tr></thead><tbody>
  <tr><td class="fr">lundi</td><td class="th">จันทร์</td><td class="fr">vendredi</td><td class="th">ศุกร์</td></tr>
  <tr><td class="fr">mardi</td><td class="th">อังคาร</td><td class="fr">samedi</td><td class="th">เสาร์</td></tr>
  <tr><td class="fr">mercredi</td><td class="th">พุธ</td><td class="fr">dimanche</td><td class="th">อาทิตย์</td></tr>
  <tr><td class="fr">jeudi</td><td class="th">พฤหัส</td><td></td><td class="th">ไม่มีตัวพิมพ์ใหญ่!</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📆 เดือน — Mois (ไม่มีตัวพิมพ์ใหญ่)</p>
  <table class="ltable"><thead><tr><th>Mois</th><th class="thai">ภาษาไทย</th><th>Mois</th><th class="thai">ภาษาไทย</th></tr></thead><tbody>
  <tr><td class="fr">janvier</td><td class="th">มกราคม</td><td class="fr">juillet</td><td class="th">กรกฎาคม</td></tr>
  <tr><td class="fr">février</td><td class="th">กุมภาพันธ์</td><td class="fr">août</td><td class="th">สิงหาคม</td></tr>
  <tr><td class="fr">mars</td><td class="th">มีนาคม</td><td class="fr">septembre</td><td class="th">กันยายน</td></tr>
  <tr><td class="fr">avril</td><td class="th">เมษายน</td><td class="fr">octobre</td><td class="th">ตุลาคม</td></tr>
  <tr><td class="fr">mai</td><td class="th">พฤษภาคม</td><td class="fr">novembre</td><td class="th">พฤศจิกายน</td></tr>
  <tr><td class="fr">juin</td><td class="th">มิถุนายน</td><td class="fr">décembre</td><td class="th">ธันวาคม</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">🍂 ฤดูกาล — Saisons</p>
  <p class="text-[13px]"><strong>le printemps</strong> <span class="thai">(ฤดูใบไม้ผลิ)</span> · <strong>l'été</strong> <span class="thai">(ฤดูร้อน)</span> · <strong>l'automne</strong> <span class="thai">(ฤดูใบไม้ร่วง)</span> · <strong>l'hiver</strong> <span class="thai">(ฤดูหนาว)</span></p></div>

  <div><p class="sec-head">📅 Format de la date — รูปแบบวันที่</p>
  <table class="ltable"><thead><tr><th class="thai">ภาษาไทย</th><th>Français</th><th class="thai">สังเกต</th></tr></thead><tbody>
  <tr><td class="th">วันที่ 1 มกราคม 2024</td><td class="fr">le 1er janvier 2024</td><td class="note">ใช้ "le" นำหน้าวันที่เสมอ</td></tr>
  <tr><td class="th">วันที่ 15 พฤษภาคม</td><td class="fr">le 15 mai</td><td class="note">ตัวเลขปกติ ยกเว้นวันที่ 1 (1er)</td></tr>
  <tr><td class="th">วันนี้</td><td class="fr">Aujourd'hui, c'est le … (jour)</td><td class="note">Aujourd'hui c'est lundi 3 avril.</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">⏳ Expressions de temps — นิพจน์บอกเวลา</p>
  <table class="ltable"><thead><tr><th>Expression</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">il y a + durée</td><td class="th">…ที่แล้ว (อดีต)</td><td class="note">Il y a 2 ans. (2 ปีที่แล้ว)</td></tr>
  <tr><td class="fr">dans + durée</td><td class="th">อีก…ข้างหน้า (อนาคต)</td><td class="note">Dans 5 minutes. (อีก 5 นาที)</td></tr>
  <tr><td class="fr">depuis + durée/date</td><td class="th">มาตั้งแต่ / มานานแล้ว</td><td class="note">J'apprends le français depuis 3 mois. (เรียนมา 3 เดือนแล้ว)</td></tr>
  <tr><td class="fr">pendant + durée</td><td class="th">นาน / ตลอดช่วง</td><td class="note">Pendant 2 heures. (นาน 2 ชั่วโมง)</td></tr>
  <tr><td class="fr">en + durée</td><td class="th">ภายใน (ใช้เวลา)</td><td class="note">J'arrive en 10 minutes. (10 นาทีก็ถึงแล้ว)</td></tr>
  </tbody></table>
  <p class="thai text-[12px] text-blue-800 mt-2">⚠️ <strong>depuis</strong> ใช้กับ présent เมื่อสิ่งนั้นยังดำเนินอยู่: "J'habite à Paris <strong>depuis</strong> 2 ans." (ฉันอยู่ปารีสมา 2 ปีแล้วและยังอยู่อยู่)</p></div>
</div>`,

"4-4": `

  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">เมื่อท่องเที่ยวฝรั่งเศส คำศัพท์เรื่องการเดินทางและทิศทางนี้จำเป็นมาก! ชาวฝรั่งเศสยินดีช่วยเสมอหากถามอย่างสุภาพ</p></div>

  <div><p class="sec-head">🚌 การเดินทาง — Transports</p>
  <table class="ltable"><thead><tr><th>ยานพาหนะ<br><span class="note">Moyen de transport</span></th><th class="thai">ภาษาไทย</th><th>บุพบท (ใช้นำหน้า)<br><span class="note">Préposition</span></th></tr></thead><tbody>
  <tr><td class="fr">le bus</td><td class="th">รถบัส</td><td class="fr">en bus</td></tr>

  <tr><td class="fr">le vélo</td><td class="th">จักรยาน</td><td class="fr">à vélo</td></tr>

  <tr><td class="fr">à pied</td><td class="th">เดินเท้า</td><td class="fr">à pied</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🗺️ ทิศทาง — Directions</p>

  <tr><td class="fr">Allez tout droit.</td><td class="th">ตรงไป</td></tr>
  <tr><td class="fr">Tournez à gauche.</td><td class="th">เลี้ยวซ้าย</td></tr>
  <tr><td class="fr">Tournez à droite.</td><td class="th">เลี้ยวขวา</td></tr>

  <div class="ex-box"><p class="sec-head">✅ บทสนทนา</p>

"5-1": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">Passé composé ใช้บอกเหตุการณ์ที่เกิดขึ้นและ<strong>สิ้นสุดแล้วในอดีต</strong> เป็นกาลอดีตที่ใช้บ่อยที่สุดในการพูด เทียบได้กับ "กิน<u>แล้ว</u>" "ไป<u>แล้ว</u>" ในภาษาไทย</p></div>

  <div class="rule-box"><p class="sec-head">📌 โครงสร้าง: Sujet + AVOIR/ÊTRE + Participe passé</p></div>

  <div><p class="sec-head">🔵 กริยาส่วนใหญ่ → ใช้ AVOIR</p>
  <table class="ltable"><thead><tr><th>Infinitif<br><span class="note">รูปฐาน</span></th><th>Participe passé<br><span class="note">กริยาช่อง 3</span></th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td class="fr">manger</td><td class="fr">mangé</td><td class="note">J'ai mangé du riz. (ฉันกินข้าวแล้ว)</td></tr>
  <tr><td class="fr">finir</td><td class="fr">fini</td><td class="note">Tu as fini ton travail. (คุณทำงานเสร็จแล้ว)</td></tr>
  <tr><td class="fr">vendre</td><td class="fr">vendu</td><td class="note">Il a vendu sa voiture. (เขาขายรถแล้ว)</td></tr>
  <tr><td class="fr">faire</td><td class="fr">fait ⚠️</td><td class="note">Nous avons fait un gâteau. (เราทำเค้กแล้ว)</td></tr>
  <tr><td class="fr">prendre</td><td class="fr">pris ⚠️</td><td class="note">Vous avez pris le métro ? (คุณนั่งรถไฟใต้ดินไหม?)</td></tr>
  <tr><td class="fr">voir</td><td class="fr">vu ⚠️</td><td class="note">Ils ont vu un film. (พวกเขาดูหนังแล้ว)</td></tr>
  <tr><td class="fr">dire</td><td class="fr">dit ⚠️</td><td class="note">J'ai dit la vérité. (ฉันพูดความจริงแล้ว)</td></tr>
  <tr><td class="fr">écrire</td><td class="fr">écrit ⚠️</td><td class="note">J'ai écrit une lettre. (ฉันเขียนจดหมายแล้ว)</td></tr>
  <tr><td class="fr">lire</td><td class="fr">lu ⚠️</td><td class="note">Elle a lu ce livre. (เธออ่านหนังสือเล่มนี้แล้ว)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🟢 กริยาการเคลื่อนที่ → ใช้ ÊTRE · จำด้วย DR MRS VANDERTRAMP</p>
  <p class="text-[11.5px] text-gray-500 mb-1.5 italic">DR MRS VANDERTRAMP = อักษรย่อของกริยาทั้ง 16 ตัวที่ใช้ être</p>
  <table class="ltable"><thead><tr><th>Infinitif<br><span class="note">รูปฐาน</span></th><th class="thai">ความหมาย</th><th>Participe passé<br><span class="note">กริยาช่อง 3</span></th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">aller</td><td class="th">ไป</td><td class="fr">allé(e)</td><td class="note">Je suis allé(e) à Paris.</td></tr>
  <tr><td class="fr">venir</td><td class="th">มา</td><td class="fr">venu(e)</td><td class="note">Elle est venue hier. (เธอมาเมื่อวาน)</td></tr>
  <tr><td class="fr">partir</td><td class="th">ออกจาก</td><td class="fr">parti(e)</td><td class="note">Ils sont partis tôt. (พวกเขาออกไปแต่เช้า)</td></tr>
  <tr><td class="fr">arriver</td><td class="th">มาถึง</td><td class="fr">arrivé(e)</td><td class="note">Tu es arrivé(e) ? (มาถึงแล้วหรือ?)</td></tr>
  <tr><td class="fr">entrer</td><td class="th">เข้า</td><td class="fr">entré(e)</td><td class="note">Il est entré. (เขาเข้ามา)</td></tr>
  <tr><td class="fr">sortir</td><td class="th">ออกไป</td><td class="fr">sorti(e)</td><td class="note">Elle est sortie. (เธอออกไป)</td></tr>
  <tr><td class="fr">monter</td><td class="th">ขึ้น</td><td class="fr">monté(e)</td><td class="note">Il est monté. (เขาขึ้นไป)</td></tr>
  <tr><td class="fr">descendre</td><td class="th">ลงมา</td><td class="fr">descendu(e)</td><td class="note">Elle est descendue. (เธอลงมา)</td></tr>
  <tr><td class="fr">naître</td><td class="th">เกิด</td><td class="fr">né(e)</td><td class="note">Il est né en 1990. (เขาเกิดปี 1990)</td></tr>
  <tr><td class="fr">mourir</td><td class="th">ตาย</td><td class="fr">mort(e)</td><td class="note">Elle est morte. (เธอเสียชีวิต)</td></tr>
  <tr><td class="fr">rester</td><td class="th">อยู่/พัก</td><td class="fr">resté(e)</td><td class="note">Je suis resté(e) à la maison. (ฉันอยู่บ้าน)</td></tr>
  <tr><td class="fr">tomber</td><td class="th">ล้ม/ตก</td><td class="fr">tombé(e)</td><td class="note">Il est tombé. (เขาล้ม)</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">⚠️ Accord avec ÊTRE</p><p class="thai text-[13px] text-blue-900">เมื่อใช้ être ต้องเพิ่ม <strong>-e</strong> สำหรับผู้หญิง และ <strong>-s</strong> สำหรับพหูพจน์<br>Il est allé → Elle est allé<strong>e</strong> → Ils sont allé<strong>s</strong> → Elles sont allé<strong>es</strong></p></div>
</div>`,

"5-2": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">Imparfait ใช้บรรยายสิ่งที่เกิดขึ้น<strong>เป็นประจำ</strong>หรือ<strong>ต่อเนื่อง</strong>ในอดีต เช่น "ตอนเด็กๆ ฉันกินข้าวเช้าทุกวัน" หรือ "ฝนกำลังตกอยู่เมื่อเขาโทรหาฉัน"</p></div>

  <div class="rule-box"><p class="sec-head">📌 วิธีสร้าง Imparfait</p><p class="text-[13px]">นำ <strong>nous</strong> ปัจจุบัน → ตัด -<em>ons</em> → เพิ่ม endings: <strong>-ais, -ais, -ait, -ions, -iez, -aient</strong><br>
  Ex: parler → nous <em>parlons</em> → parl- + ais = <strong>parlais</strong></p></div>

  <div><p class="sec-head">🔵 PARLER à l'imparfait (พูด — ในอดีต)</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>รูปกริยา<br><span class="note">Forme</span></th><th class="thai">ตัวอย่าง</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">parlais</td><td class="th">Je parlais trop vite. (ฉันพูดเร็วเกินไป เมื่อก่อน)</td></tr>
  <tr><td>Tu</td><td class="fr">parlais</td><td class="th">Tu parlais souvent. (คุณพูดบ่อย เมื่อก่อน)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">parlait</td><td class="th">Il parlait tout le temps. (เขาพูดตลอดเวลา)</td></tr>
  <tr><td>Nous</td><td class="fr">parlions</td><td class="th">Nous parlions ensemble. (เราพูดคุยกัน)</td></tr>
  <tr><td>Vous</td><td class="fr">parliez</td><td class="th">Vous parliez trop fort. (คุณพูดดังเกินไป)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">parlaient</td><td class="th">Ils parlaient français. (พวกเขาพูดภาษาฝรั่งเศส)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📊 Imparfait vs Passé composé</p>
  <table class="ltable"><thead><tr><th>Imparfait</th><th>Passé composé</th></tr></thead><tbody>
  <tr><td class="note">Habitude: Je <em>mangeais</em> du riz chaque soir.<br>(ฉันกินข้าวทุกเย็น — เป็นประจำ)</td><td class="note">Événement: J'<em>ai mangé</em> du riz hier soir.<br>(ฉันกินข้าวเมื่อคืน — ครั้งเดียว)</td></tr>
  <tr><td class="note">Arrière-plan: Il <em>pleuvait</em>…<br>(ฝนกำลังตก… — พื้นหลัง)</td><td class="note">Action: …quand tu <em>es arrivé</em>.<br>(…เมื่อคุณมาถึง — เหตุการณ์)</td></tr>
  <tr><td class="note">Description: La maison <em>était</em> belle.<br>(บ้านสวยงาม)</td><td class="note">Changement: Soudain il <em>a crié</em>.<br>(ทันใดนั้นเขาตะโกน)</td></tr>
  </tbody></table></div>
</div>`,

"5-3": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ภาษาฝรั่งเศสมีสองแบบสำหรับอนาคต: <strong>futur proche</strong> (ใกล้) ใช้บ่อยในการพูด และ <strong>futur simple</strong> สำหรับแผนการหรือการพยากรณ์</p></div>

  <div class="rule-box"><p class="sec-head">🟢 Futur proche = ALLER + Infinitif (ง่ายมาก!)</p>
  <table class="ltable"><thead><tr><th>Sujet</th><th>ALLER</th><th>+ Infinitif</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">vais</td><td class="fr">manger</td><td class="th">ฉันกำลังจะกิน</td></tr>
  <tr><td>Tu</td><td class="fr">vas</td><td class="fr">partir</td><td class="th">คุณกำลังจะออกไป</td></tr>
  <tr><td>Il/Elle</td><td class="fr">va</td><td class="fr">arriver</td><td class="th">เขากำลังจะมาถึง</td></tr>
  <tr><td>Nous</td><td class="fr">allons</td><td class="fr">voyager</td><td class="th">เรากำลังจะเดินทาง</td></tr>

"5-4": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">สรรพนามกรรมช่วยหลีกเลี่ยงการพูดซ้ำ แทนที่จะพูด "Je mange la pizza" ซ้ำ เราพูด "Je <strong>la</strong> mange" ฟังดูเป็นธรรมชาติมากกว่า</p></div>

  <div><p class="sec-head">🔵 COD (Complément d'Objet Direct) — สรรพนามกรรมตรง</p>
  <p class="thai text-[12px] text-gray-600 mb-1.5">COD = สิ่งที่ถูกกระทำโดยตรง ไม่มีคำบุพบท "à" นำหน้า<br>เช่น Je mange <u>la pizza</u> → Je <strong>la</strong> mange.</p>
  <table class="ltable"><thead><tr><th>สรรพนาม<br><span class="note">Pronom COD</span></th><th class="thai">แทนใคร/อะไร</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td class="fr">me / m'</td><td class="th">ฉัน (กรรม)</td><td class="note">Il me regarde. (เขามองฉัน)</td></tr>
  <tr><td class="fr">te / t'</td><td class="th">คุณ (กรรม)</td><td class="note">Je t'aime. (ฉันรักคุณ)</td></tr>
  <tr><td class="fr">le / l'</td><td class="th">เขา/มัน (ชาย)</td><td class="note">Je le mange. (ฉันกินมัน)</td></tr>
  <tr><td class="fr">la / l'</td><td class="th">เธอ/มัน (หญิง)</td><td class="note">Je la connais. (ฉันรู้จักเธอ)</td></tr>
  <tr><td class="fr">nous</td><td class="th">เรา</td><td class="note">Elle nous invite. (เธอเชิญพวกเรา)</td></tr>
  <tr><td class="fr">vous</td><td class="th">คุณ/พวกคุณ</td><td class="note">Je vous comprends.</td></tr>
  <tr><td class="fr">les</td><td class="th">พวกเขา/พวกมัน</td><td class="note">Tu les aimes ? (คุณชอบพวกนั้นไหม?)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🟢 COI (Complément d'Objet Indirect) — สรรพนามกรรมรอง</p>
  <p class="thai text-[12px] text-gray-600 mb-1.5">COI = แทน "à + คน" เช่น Je parle <u>à Marie</u> → Je <strong>lui</strong> parle.</p>
  <table class="ltable"><thead><tr><th>สรรพนาม<br><span class="note">Pronom COI</span></th><th class="thai">แทนใคร</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td class="fr">lui</td><td class="th">แก่เขา/เธอ (เอกพจน์)</td><td class="note">Je lui parle. (ฉันพูดกับเขา/เธอ)</td></tr>
  <tr><td class="fr">leur</td><td class="th">แก่พวกเขา/เธอ</td><td class="note">Je leur écris. (ฉันเขียนถึงพวกเขา)</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">📍 ตำแหน่ง: สรรพนามอยู่ ก่อน กริยา</p>
  <p class="text-[13px]">✅ <strong>Je le mange.</strong> (ฉันกินมัน)<br>✅ <strong>Je ne le mange pas.</strong> (ฉันไม่กินมัน)<br>✅ Futur proche: <strong>Je vais le manger.</strong> (ฉันกำลังจะกินมัน)</p></div>
</div>`,

"6-1": `

"6-3": `
<div class="space-y-3">

  <tr><td class="th">การถามเงินเดือน</td><td class="note">พอถามได้</td><td class="note">หัวข้อต้องห้ามมาก! อย่าถาม</td></tr>
  <tr><td class="th">ความตรงต่อเวลา</td><td class="note">ยืดหยุ่น</td><td class="note">ธุรกิจ: ตรงเวลาสำคัญมาก แต่งานสังสรรค์ช้า 15-30 นาทีเป็นเรื่องปกติ</td></tr>

</div>`,

"1-6": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ภาษาฝรั่งเศสมีกฎพิเศษ 2 อย่างที่ทำให้การพูดไหลลื่น: <strong>Élision</strong> (ตัดสระก่อนสระ) และ <strong>Liaison</strong> (เชื่อมพยัญชนะท้ายกับสระต้นคำถัดไป) รู้สองอย่างนี้แล้วฟังดูเหมือนเจ้าของภาษาทันที!</p><p class="text-[12px] text-amber-700 mt-1 italic">L'élision et la liaison rendent la parole française naturelle et fluide.</p></div>

  <div class="rule-box"><p class="sec-head">✂️ L'Élision — ตัดสระออกก่อนสระหรือ H muet</p>
  <table class="ltable"><thead><tr><th>Avant</th><th>Après élision</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td class="fr">le / la → l'</td><td class="fr">l'ami, l'école, l'hôtel</td><td class="th">เพื่อน, โรงเรียน, โรงแรม</td></tr>
  <tr><td class="fr">je → j'</td><td class="fr">j'aime, j'ai, j'arrive</td><td class="th">ฉันรัก, ฉันมี, ฉันมาถึง</td></tr>
  <tr><td class="fr">de → d'</td><td class="fr">d'accord, d'abord, d'eau</td><td class="th">ตกลง, ก่อนอื่น, น้ำ</td></tr>
  <tr><td class="fr">ne → n'</td><td class="fr">n'est pas, n'a pas</td><td class="th">ไม่ใช่, ไม่มี</td></tr>
  <tr><td class="fr">que → qu'</td><td class="fr">qu'il, qu'elle, qu'on</td><td class="th">ที่เขา, ที่เธอ, ที่เรา</td></tr>
  <tr><td class="fr">se → s'</td><td class="fr">s'appelle, s'habille</td><td class="th">ชื่อ, แต่งตัว</td></tr>
  <tr><td class="fr">ce → c'</td><td class="fr">c'est, c'était</td><td class="th">นี่คือ, นั่นคือ</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🔗 La Liaison — เชื่อมเสียง (พยัญชนะท้ายคำ + สระต้นคำถัดไป)</p>
  <p class="thai text-[12.5px] text-gray-700 mb-2">โดยปกติ พยัญชนะท้ายคำ<strong>ไม่ออกเสียง</strong> แต่ถ้าคำถัดไปขึ้นต้นด้วยสระ จะ<strong>ออกเสียงพยัญชนะนั้น</strong>และเชื่อมติดกัน</p>
  <table class="ltable"><thead><tr><th>Exemple</th><th class="thai">ออกเสียงว่า</th><th class="thai">สังเกต</th></tr></thead><tbody>
  <tr><td class="fr">les enfants</td><td class="note">le-ZAN-fan</td><td class="th">s ออกเสียงเป็น Z</td></tr>
  <tr><td class="fr">vous avez</td><td class="note">vou-ZA-vé</td><td class="th">s ออกเสียงเป็น Z</td></tr>
  <tr><td class="fr">ils arrivent</td><td class="note">il-ZA-riiv</td><td class="th">s ออกเสียงเป็น Z</td></tr>
  <tr><td class="fr">un ami</td><td class="note">u-NA-mi</td><td class="th">n ออกเสียงต่อเนื่อง</td></tr>
  <tr><td class="fr">mon ami</td><td class="note">mo-NA-mi</td><td class="th">n ออกเสียงต่อเนื่อง</td></tr>
  <tr><td class="fr">un grand ami</td><td class="note">un gra-TA-mi</td><td class="th">d ออกเสียงเป็น T</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🔤 สระประสมสำคัญ — Combinaisons de voyelles</p>
  <table class="ltable"><thead><tr><th>Combinaison</th><th class="thai">ออกเสียงว่า</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">eau / au</td><td class="th">โอ</td><td class="note">eau (น้ำ), beau (สวย), chaud (ร้อน), gauche (ซ้าย)</td></tr>
  <tr><td class="fr">ou</td><td class="th">อู</td><td class="note">rouge (แดง), bonjour, tout (ทั้งหมด), vous</td></tr>
  <tr><td class="fr">oi</td><td class="th">วา</td><td class="note">moi (ฉัน), toi (คุณ), voiture (รถ), boire (ดื่ม)</td></tr>
  <tr><td class="fr">ai / ei / et</td><td class="th">แอ</td><td class="note">j'ai (ฉันมี), mais (แต่), lait (นม), poulet (ไก่)</td></tr>
  <tr><td class="fr">eu / œu</td><td class="th">เออ (ห่อปาก)</td><td class="note">feu (ไฟ), peur (กลัว), heure (ชั่วโมง), cœur (หัวใจ)</td></tr>
  <tr><td class="fr">ui</td><td class="th">อุ-อี (รวดเร็ว)</td><td class="note">nuit (กลางคืน), lui (เขา), fruit (ผลไม้), cuisine</td></tr>
  <tr><td class="fr">ill / ille</td><td class="th">อิย</td><td class="note">fille (สาว), famille (ครอบครัว), travailler (ทำงาน)</td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่าง</p>
  <p class="text-[13px]"><strong>J'aime les enfants.</strong> <span class="thai text-[12.5px] text-green-800">ฉันรักเด็กๆ — j' (élision de je) + les-ZAN-fants (liaison)</span></p>
  <p class="text-[13px] mt-1.5"><strong>Vous avez un ami ici ?</strong> <span class="thai text-[12.5px] text-green-800">คุณมีเพื่อนที่นี่ไหม? — vou-ZA-vé + u-NA-mi (deux liaisons!)</span></p>
  <p class="text-[13px] mt-1.5"><strong>C'est l'école de mon ami.</strong> <span class="thai text-[12.5px] text-green-800">นั่นคือโรงเรียนของเพื่อนฉัน — c'est (élision) + l'école (élision)</span></p></div>
</div>`,

"2-5": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">Articles partitifs ใช้กับสิ่งที่ <strong>นับไม่ได้</strong> หรือ <strong>ส่วนหนึ่ง</strong> ของบางสิ่ง เช่น "กินข้าว" — ไม่ได้กินข้าวทั้งโลก แต่กินแค่บางส่วน ภาษาฝรั่งเศสต้องระบุเรื่องนี้ให้ชัดเจน!</p><p class="text-[12px] text-amber-700 mt-1 italic">Les articles partitifs indiquent une quantité non définie d'une chose non comptable.</p></div>

  <div><p class="sec-head">📖 Articles partitifs — รูปแบบ 4 แบบ</p>
  <table class="ltable"><thead><tr><th>Article</th><th class="thai">ใช้กับ</th><th>Exemple</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">du (= de + le)</td><td class="th">คำนามชาย เอกพจน์</td><td class="fr">du pain, du riz, du café</td><td class="th">ขนมปัง, ข้าว, กาแฟ (บางส่วน)</td></tr>
  <tr><td class="fr">de la</td><td class="th">คำนามหญิง เอกพจน์</td><td class="fr">de la viande, de la soupe</td><td class="th">เนื้อ, ซุป (บางส่วน)</td></tr>
  <tr><td class="fr">de l'</td><td class="th">ขึ้นต้นด้วยสระ (ทั้งสองเพศ)</td><td class="fr">de l'eau, de l'argent, de l'huile</td><td class="th">น้ำ, เงิน, น้ำมัน</td></tr>
  <tr><td class="fr">des</td><td class="th">พหูพจน์</td><td class="fr">des légumes, des fruits</td><td class="th">ผัก, ผลไม้ (หลายอย่าง)</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">⚠️ Forme négative → TOUJOURS de / d' (ไม่มีข้อยกเว้น!)</p>
  <table class="ltable"><thead><tr><th>Affirmatif ✅</th><th>Négatif ❌</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">Je mange du pain.</td><td class="fr">Je ne mange <u>pas de</u> pain.</td><td class="th">ฉันไม่กินขนมปัง</td></tr>
  <tr><td class="fr">Il boit de la bière.</td><td class="fr">Il ne boit <u>pas de</u> bière.</td><td class="th">เขาไม่ดื่มเบียร์</td></tr>
  <tr><td class="fr">Tu as de l'argent.</td><td class="fr">Tu n'as <u>pas d'</u>argent.</td><td class="th">คุณไม่มีเงิน</td></tr>
  <tr><td class="fr">Ils mangent des fruits.</td><td class="fr">Ils ne mangent <u>pas de</u> fruits.</td><td class="th">พวกเขาไม่กินผลไม้</td></tr>
  </tbody></table>
  <p class="thai text-[12.5px] text-blue-900 mt-2">⚠️ ในประโยคปฏิเสธ du / de la / de l' / des → กลายเป็น <strong>de</strong> (หรือ <strong>d'</strong> ก่อนสระ) ทั้งหมด!</p></div>

  <div><p class="sec-head">📊 เปรียบเทียบ Articles ทั้งสามแบบ</p>
  <table class="ltable"><thead><tr><th>Article</th><th class="thai">ใช้เมื่อ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">le / la / les<br><span class="note">défini</span></td><td class="th">รู้จักแล้ว / ระบุได้ว่าอันไหน</td><td class="note">Le pain de cette boulangerie est délicieux.<br><span class="thai text-[11.5px]">(ขนมปังของร้านนั้น — ร้านที่รู้จักแล้ว)</span></td></tr>
  <tr><td class="fr">un / une / des<br><span class="note">indéfini</span></td><td class="th">นับได้ / หนึ่งชิ้น</td><td class="note">Je voudrais une baguette.<br><span class="thai text-[11.5px]">(บาแกตต์หนึ่งอัน — นับได้)</span></td></tr>
  <tr><td class="fr">du / de la / de l'<br><span class="note">partitif</span></td><td class="th">นับไม่ได้ / ส่วนหนึ่ง</td><td class="note">Je mange du pain.<br><span class="thai text-[11.5px]">(กินขนมปังบางส่วน — ไม่ระบุปริมาณ)</span></td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่างในชีวิตจริง</p>
  <p class="text-[13px]"><strong>Le matin, je bois du café et je mange du pain avec du beurre.</strong><br><span class="thai text-[12.5px] text-green-800">ตอนเช้าฉันดื่มกาแฟและกินขนมปังกับเนย</span></p>
  <p class="text-[13px] mt-2"><strong>— Vous voulez de la soupe ? — Non merci, je ne mange pas de soupe.</strong><br><span class="thai text-[12.5px] text-green-800">— ต้องการซุปไหม? — ไม่ขอบคุณ ฉันไม่กินซุป</span></p>
  <p class="text-[13px] mt-2"><strong>Il faut de la patience pour apprendre le français !</strong><br><span class="thai text-[12.5px] text-green-800">ต้องมีความอดทนในการเรียนภาษาฝรั่งเศส!</span></p></div>
</div>`,

"3-6": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">กริยาเหล่านี้ไม่ทำตามกฎปกติ แต่ใช้ทุกวันในทุกการสนทนา! จำให้ขึ้นใจแล้วจะพูดได้ลื่นมาก</p></div>

  <div><p class="sec-head">🔴 FAIRE = ทำ / ทำอาหาร / เล่นกีฬา / กิจกรรม</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>Conjugaison</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">fais</td><td class="th">Je fais la cuisine. (ฉันทำอาหาร)</td></tr>
  <tr><td>Tu</td><td class="fr">fais</td><td class="th">Tu fais du sport ? (คุณออกกำลังกายไหม?)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">fait</td><td class="th">Il fait ses devoirs. (เขาทำการบ้าน)</td></tr>
  <tr><td>Nous</td><td class="fr">faisons</td><td class="th">Nous faisons une promenade. (เราเดินเล่น)</td></tr>
  <tr><td>Vous</td><td class="fr">faites</td><td class="th">Vous faites quoi ce soir ? (คืนนี้คุณทำอะไร?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">font</td><td class="th">Ils font du vélo. (พวกเขาขี่จักรยาน)</td></tr>
  </tbody></table>
  <p class="note mt-1.5 px-1">💡 <strong>faire du/de la + activité :</strong> faire du foot, faire de la natation, faire du yoga, faire la vaisselle (ล้างจาน)</p></div>

  <div><p class="sec-head">🔵 PRENDRE = เอา / กิน / ดื่ม / นั่ง (พาหนะ)</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>Conjugaison</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">prends</td><td class="th">Je prends le métro. (ฉันนั่งรถไฟใต้ดิน)</td></tr>
  <tr><td>Tu</td><td class="fr">prends</td><td class="th">Tu prends un café ? (เอากาแฟไหม?)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">prend</td><td class="th">Elle prend son sac. (เธอเอากระเป๋า)</td></tr>
  <tr><td>Nous</td><td class="fr">prenons</td><td class="th">Nous prenons le train. (เรานั่งรถไฟ)</td></tr>
  <tr><td>Vous</td><td class="fr">prenez</td><td class="th">Vous prenez quoi ? (จะเอาอะไร?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">prennent</td><td class="th">Ils prennent leur temps. (พวกเขาไม่รีบ)</td></tr>
  </tbody></table>
  <p class="note mt-1.5 px-1">💡 ครอบครัวเดียวกัน: <strong>apprendre</strong> (เรียน) · <strong>comprendre</strong> (เข้าใจ) · <strong>surprendre</strong> (เซอร์ไพรส์) → ผันเหมือน prendre ทุกอย่าง!</p></div>

  <div><p class="sec-head">🟢 VENIR = มา</p>
  <table class="ltable"><thead><tr><th>สรรพนาม</th><th>Conjugaison</th><th class="thai">ตัวอย่าง + แปล</th></tr></thead><tbody>
  <tr><td>Je</td><td class="fr">viens</td><td class="th">Je viens de Bangkok. (ฉันมาจากกรุงเทพ)</td></tr>
  <tr><td>Tu</td><td class="fr">viens</td><td class="th">Tu viens avec nous ? (มากับเราไหม?)</td></tr>
  <tr><td>Il/Elle/On</td><td class="fr">vient</td><td class="th">Elle vient de rentrer. (เธอเพิ่งกลับมา)</td></tr>
  <tr><td>Nous</td><td class="fr">venons</td><td class="th">Nous venons d'arriver. (เราเพิ่งมาถึง)</td></tr>
  <tr><td>Vous</td><td class="fr">venez</td><td class="th">D'où venez-vous ? (คุณมาจากที่ไหน?)</td></tr>
  <tr><td>Ils/Elles</td><td class="fr">viennent</td><td class="th">Ils viennent demain. (พวกเขามาพรุ่งนี้)</td></tr>
  </tbody></table>
  <p class="note mt-1.5 px-1">💡 <strong>venir de + infinitif = เพิ่งจะ:</strong> Je viens de manger. (ฉันเพิ่งกินเสร็จ) · Elle vient de partir. (เธอเพิ่งออกไป)</p></div>

  <div class="rule-box"><p class="sec-head">📌 SAVOIR vs CONNAÎTRE — ทั้งสองแปลว่า "รู้" แต่ต่างกัน!</p>
  <table class="ltable"><thead><tr><th>Verbe</th><th class="thai">ใช้กับ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">SAVOIR<br><span class="note">je sais · il sait · nous savons</span></td><td class="th">ข้อเท็จจริง · วิธีทำสิ่งนั้น · ข้อมูล</td><td class="note">Je sais nager. (ฉันว่ายน้ำเป็น)<br>Tu sais quelle heure il est ? (รู้ไหมกี่โมงแล้ว?)</td></tr>
  <tr><td class="fr">CONNAÎTRE<br><span class="note">je connais · il connaît · nous connaissons</span></td><td class="th">คน · สถานที่ · สิ่งที่คุ้นเคย</td><td class="note">Je connais Marie. (ฉันรู้จักมารี)<br>Tu connais Paris ? (คุณรู้จักปารีสไหม?)</td></tr>
  </tbody></table></div>
</div>`,

"4-5": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ความรู้สึกและสภาพอากาศ — สองหัวข้อที่พูดถึงทุกวัน! เรียนสองหัวข้อนี้แล้วจะสื่อสารในชีวิตประจำวันได้ทันที</p></div>

  <div><p class="sec-head">😊 ความรู้สึก — Les émotions (avec ÊTRE)</p>
  <table class="ltable"><thead><tr><th>Adjectif</th><th class="thai">ชาย / หญิง</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">heureux / heureuse</td><td class="note">masc / fém</td><td class="th">มีความสุข</td><td class="note">Je suis heureux !</td></tr>
  <tr><td class="fr">triste</td><td class="note">masc = fém</td><td class="th">เศร้า</td><td class="note">Elle est triste aujourd'hui.</td></tr>
  <tr><td class="fr">fâché(e)</td><td class="note">fâché / fâchée</td><td class="th">โกรธ</td><td class="note">Il est fâché contre moi.</td></tr>
  <tr><td class="fr">fatigué(e)</td><td class="note">fatigué / fatiguée</td><td class="th">เหนื่อย/เพลีย</td><td class="note">Je suis fatiguée ce soir.</td></tr>
  <tr><td class="fr">content(e)</td><td class="note">content / contente</td><td class="th">พอใจ/ดีใจ</td><td class="note">Je suis content de te voir !</td></tr>
  <tr><td class="fr">inquiet / inquiète</td><td class="note">masc / fém (irrégulier)</td><td class="th">กังวล</td><td class="note">Tu es inquiète ?</td></tr>
  <tr><td class="fr">surpris(e)</td><td class="note">surpris / surprise</td><td class="th">ตกใจ/แปลกใจ</td><td class="note">Je suis surprise !</td></tr>
  <tr><td class="fr">amoureux / amoureuse</td><td class="note">masc / fém</td><td class="th">หลงรัก</td><td class="note">Il est amoureux d'elle.</td></tr>
  <tr><td class="fr">stressé(e)</td><td class="note">stressé / stressée</td><td class="th">เครียด</td><td class="note">Je suis très stressée !</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">💬 Expressions avec AVOIR (ใช้ avoir ไม่ใช่ être!)</p>
  <table class="ltable"><thead><tr><th>Expression</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">avoir peur (de)</td><td class="th">กลัว</td><td class="note">J'ai peur des araignées. (ฉันกลัวแมงมุม)</td></tr>
  <tr><td class="fr">avoir honte</td><td class="th">อาย/ละอาย</td><td class="note">J'ai honte. (ฉันอาย)</td></tr>
  <tr><td class="fr">avoir envie de</td><td class="th">อยากจะ</td><td class="note">J'ai envie de dormir. (ฉันอยากนอน)</td></tr>
  <tr><td class="fr">avoir besoin de</td><td class="th">ต้องการ</td><td class="note">J'ai besoin d'aide. (ฉันต้องการความช่วยเหลือ)</td></tr>
  <tr><td class="fr">avoir mal à</td><td class="th">ปวด...</td><td class="note">J'ai mal à la tête. / J'ai mal au ventre. (ปวดหัว / ปวดท้อง)</td></tr>
  <tr><td class="fr">avoir confiance en</td><td class="th">ไว้วางใจ</td><td class="note">J'ai confiance en toi. (ฉันไว้ใจคุณ)</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">⛅ สภาพอากาศ — La météo</p>
  <table class="ltable"><thead><tr><th>Expression</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">Il fait beau.</td><td class="th">อากาศดี / ท้องฟ้าแจ่มใส</td></tr>
  <tr><td class="fr">Il fait chaud / froid.</td><td class="th">อากาศร้อน / หนาว</td></tr>
  <tr><td class="fr">Il fait mauvais.</td><td class="th">อากาศไม่ดี</td></tr>
  <tr><td class="fr">Il pleut. (verbe : pleuvoir)</td><td class="th">ฝนตก</td></tr>
  <tr><td class="fr">Il neige. (verbe : neiger)</td><td class="th">หิมะตก</td></tr>
  <tr><td class="fr">Il y a du soleil.</td><td class="th">มีแดด</td></tr>
  <tr><td class="fr">Il y a du vent.</td><td class="th">มีลม</td></tr>
  <tr><td class="fr">Il y a des nuages.</td><td class="th">มีเมฆ</td></tr>
  <tr><td class="fr">Il y a du brouillard.</td><td class="th">มีหมอก</td></tr>
  <tr><td class="fr">Il fait … degrés.</td><td class="th">อุณหภูมิ… องศา</td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่างประโยค</p>
  <p class="text-[13px]"><strong>Aujourd'hui il fait chaud et il y a du soleil, je suis contente !</strong><br><span class="thai text-[12.5px] text-green-800">วันนี้อากาศร้อนและมีแดด ฉันดีใจ!</span></p>
  <p class="text-[13px] mt-2"><strong>Je suis fatiguée et j'ai mal à la tête parce qu'il fait trop chaud.</strong><br><span class="thai text-[12.5px] text-green-800">ฉันเหนื่อยและปวดหัวเพราะอากาศร้อนเกินไป</span></p>
  <p class="text-[13px] mt-2"><strong>Il pleut, mais je suis heureux parce que j'ai envie de rester à la maison.</strong><br><span class="thai text-[12.5px] text-green-800">ฝนตก แต่ฉันมีความสุขเพราะอยากอยู่บ้าน</span></p></div>
</div>`,

"5-5": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">การเปรียบเทียบในภาษาฝรั่งเศสมีโครงสร้างที่ชัดเจนและสม่ำเสมอ เรียนสูตรไม่กี่อย่างก็เปรียบเทียบได้ทุกเรื่อง!</p><p class="text-[12px] text-amber-700 mt-1 italic">Le comparatif et le superlatif permettent de comparer personnes, objets et situations.</p></div>

  <div class="rule-box"><p class="sec-head">📊 Comparatif — การเปรียบเทียบ (3 ระดับ)</p>
  <table class="ltable"><thead><tr><th class="thai">ระดับ</th><th>Structure</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="th">มากกว่า ➕</td><td class="fr">plus + adj + que</td><td class="note">Le français est plus difficile que l'anglais.<br><span class="thai text-[11.5px]">(ภาษาฝรั่งเศสยากกว่าภาษาอังกฤษ)</span></td></tr>
  <tr><td class="th">เท่ากัน ↔</td><td class="fr">aussi + adj + que</td><td class="note">Tu es aussi grand que moi.<br><span class="thai text-[11.5px]">(คุณสูงเท่าฉัน)</span></td></tr>
  <tr><td class="th">น้อยกว่า ➖</td><td class="fr">moins + adj + que</td><td class="note">Ce resto est moins cher que l'autre.<br><span class="thai text-[11.5px]">(ร้านนี้ถูกกว่าร้านอื่น)</span></td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🏆 Superlatif — ขั้นสูงสุด</p>
  <table class="ltable"><thead><tr><th class="thai">ระดับ</th><th>Structure</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="th">สูงสุด ⬆️</td><td class="fr">le/la/les plus + adj (+ de)</td><td class="note">C'est la plus belle ville <strong>du monde</strong>.<br><span class="thai text-[11.5px]">(เมืองที่สวยที่สุดในโลก — de = "ใน")</span></td></tr>
  <tr><td class="th">ต่ำสุด ⬇️</td><td class="fr">le/la/les moins + adj (+ de)</td><td class="note">C'est le moins cher <strong>du marché</strong>.<br><span class="thai text-[11.5px]">(ถูกที่สุดในตลาด)</span></td></tr>
  </tbody></table>
  <p class="thai text-[12.5px] text-gray-600 mt-2 px-1">💡 article (le/la/les) doit s'accorder avec le nom : le plus grand, la plus grande, les plus grands</p></div>

  <div class="rule-box"><p class="sec-head">⚠️ Formes irrégulières (ต้องจำ! ไม่ใช้ plus/moins)</p>
  <table class="ltable"><thead><tr><th>Adjectif/Adverbe</th><th class="thai">ความหมาย</th><th>Comparatif</th><th>Superlatif</th></tr></thead><tbody>
  <tr><td class="fr">bon(ne)</td><td class="th">ดี (คุณศัพท์)</td><td class="fr">meilleur(e) que</td><td class="fr">le/la meilleur(e)</td></tr>
  <tr><td class="fr">mauvais(e)</td><td class="th">แย่/ไม่ดี</td><td class="fr">pire que</td><td class="fr">le/la pire</td></tr>
  <tr><td class="fr">bien</td><td class="th">ดี (กริยาวิเศษณ์)</td><td class="fr">mieux que</td><td class="fr">le mieux</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">📦 Comparatif de quantité — เปรียบเทียบจำนวน/ปริมาณ</p>
  <table class="ltable"><thead><tr><th>Structure</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">plus de + nom + que</td><td class="th">มากกว่า</td><td class="note">Il y a plus de voitures que de vélos.</td></tr>
  <tr><td class="fr">moins de + nom + que</td><td class="th">น้อยกว่า</td><td class="note">J'ai moins d'argent que toi.</td></tr>
  <tr><td class="fr">autant de + nom + que</td><td class="th">เท่ากัน</td><td class="note">Elle a autant de livres que moi.</td></tr>
  </tbody></table></div>

  <div class="ex-box"><p class="sec-head">✅ ตัวอย่าง</p>
  <p class="text-[13px]"><strong>Ce film est meilleur que le premier.</strong> <span class="thai text-[12.5px] text-green-800">หนังเรื่องนี้ดีกว่าภาคแรก (meilleur = irrégulier de bon)</span></p>
  <p class="text-[13px] mt-1.5"><strong>C'est la meilleure boulangerie de Paris !</strong> <span class="thai text-[12.5px] text-green-800">นี่คือร้านขนมปังที่ดีที่สุดในปารีส!</span></p>
  <p class="text-[13px] mt-1.5"><strong>Il parle mieux le français que moi.</strong> <span class="thai text-[12.5px] text-green-800">เขาพูดภาษาฝรั่งเศสได้ดีกว่าฉัน (mieux = irrégulier de bien)</span></p></div>
</div>`,

"6-4": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">บุพบทบอกสถานที่ช่วยให้บอกตำแหน่งของสิ่งต่างๆ ได้ จำเป็นมากทั้งในการเดินทาง การบอกทาง และการอธิบายสภาพแวดล้อม!</p><p class="text-[12px] text-amber-700 mt-1 italic">Les prépositions de lieu indiquent où se trouvent les personnes et les objets.</p></div>

  <div><p class="sec-head">📍 บุพบทบอกตำแหน่ง — Prépositions de lieu</p>
  <table class="ltable"><thead><tr><th>Préposition</th><th class="thai">ความหมาย</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">dans</td><td class="th">ใน (ข้างใน)</td><td class="note">Le chat est dans la boîte. (แมวอยู่ในกล่อง)</td></tr>
  <tr><td class="fr">sur</td><td class="th">บน</td><td class="note">Le livre est sur la table. (หนังสืออยู่บนโต๊ะ)</td></tr>
  <tr><td class="fr">sous</td><td class="th">ใต้</td><td class="note">Le chien est sous le lit. (สุนัขอยู่ใต้เตียง)</td></tr>
  <tr><td class="fr">devant</td><td class="th">ด้านหน้า</td><td class="note">Je t'attends devant l'hôtel. (ฉันรอคุณหน้าโรงแรม)</td></tr>
  <tr><td class="fr">derrière</td><td class="th">ด้านหลัง</td><td class="note">Le jardin est derrière la maison. (สวนอยู่หลังบ้าน)</td></tr>
  <tr><td class="fr">entre</td><td class="th">ระหว่าง</td><td class="note">La poste est entre la banque et le café.</td></tr>
  <tr><td class="fr">à côté de</td><td class="th">ข้างๆ / ติดกับ</td><td class="note">La pharmacie est à côté de la boulangerie.</td></tr>
  <tr><td class="fr">en face de</td><td class="th">ตรงข้าม</td><td class="note">L'hôtel est en face de la gare. (โรงแรมอยู่ตรงข้ามสถานีรถไฟ)</td></tr>
  <tr><td class="fr">près de</td><td class="th">ใกล้</td><td class="note">J'habite près du centre-ville. (ฉันอยู่ใกล้ใจกลางเมือง)</td></tr>
  <tr><td class="fr">loin de</td><td class="th">ไกล</td><td class="note">C'est loin d'ici ? (ไกลจากที่นี่ไหม?)</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">🌍 À / EN / AU / AUX — ใช้กับเมืองและประเทศ</p>
  <table class="ltable"><thead><tr><th>Préposition</th><th class="thai">ใช้กับ</th><th>Exemple</th></tr></thead><tbody>
  <tr><td class="fr">à</td><td class="th">ชื่อเมือง (ทุกเมือง)</td><td class="note">à Paris, à Bangkok, à Tokyo, à New York</td></tr>
  <tr><td class="fr">en</td><td class="th">ประเทศเพศหญิง หรือขึ้นต้นด้วยสระ</td><td class="note">en France, en Thaïlande, en Italie, en Espagne</td></tr>
  <tr><td class="fr">au (= à + le)</td><td class="th">ประเทศเพศชาย</td><td class="note">au Japon, au Canada, au Mexique, au Maroc</td></tr>
  <tr><td class="fr">aux (= à + les)</td><td class="th">ประเทศพหูพจน์</td><td class="note">aux États-Unis, aux Philippines</td></tr>
  </tbody></table>
  <p class="thai text-[12.5px] text-blue-900 mt-2">💡 ประเทศส่วนใหญ่ที่ลงท้ายด้วย -e เป็นเพศหญิง: la France, la Thaïlande, l'Italie…</p></div>

  <div class="ex-box"><p class="sec-head">✅ บทสนทนา</p>
  <p class="text-[13px]">— <strong>Excusez-moi, où est la pharmacie ?</strong><br><span class="thai text-[12.5px] text-green-800">ขอโทษ ร้านขายยาอยู่ที่ไหนครับ?</span></p>
  <p class="text-[13px] mt-2">— <strong>Elle est en face du supermarché, à côté de la banque.</strong><br><span class="thai text-[12.5px] text-green-800">อยู่ตรงข้ามซูเปอร์มาร์เก็ต ข้างๆ ธนาคาร</span></p>
  <p class="text-[13px] mt-2"><strong>J'habite en Thaïlande, à Bangkok, près du parc Lumphini.</strong><br><span class="thai text-[12.5px] text-green-800">ฉันอาศัยอยู่ในประเทศไทย ที่กรุงเทพ ใกล้ๆ สวนลุมพินี</span></p></div>
</div>`,

"1-7": `
<div class="space-y-3">
  <div class="tip-box"><p class="sec-head">🇹🇭 บทนำ</p><p class="thai text-[13.5px] text-amber-900 leading-relaxed">ก่อนจะพูดภาษาฝรั่งเศสได้คล่อง สิ่งสำคัญที่สุดคือการรู้จักประโยคที่ช่วยให้คุณ "อยู่รอด" ในฝรั่งเศสได้! ประโยคเหล่านี้จะช่วยคุณในทุกสถานการณ์ฉุกเฉิน</p><p class="text-[12px] text-amber-700 mt-1 italic">Ces phrases essentielles vous permettent de vous débrouiller même avec peu de français !</p></div>

  <div class="rule-box"><p class="sec-head">🗣️ เมื่อไม่เข้าใจ — Quand on ne comprend pas</p>
  <table class="ltable"><thead><tr><th>Phrase</th><th class="thai">ความหมาย</th><th class="thai">ระดับ</th></tr></thead><tbody>
  <tr><td class="fr">Je ne comprends pas.</td><td class="th">ฉันไม่เข้าใจ</td><td class="note">ใช้บ่อยที่สุด!</td></tr>
  <tr><td class="fr">Pardon ?</td><td class="th">อะไรนะ? (ขอโทษ?)</td><td class="note">สั้น สุภาพ</td></tr>
  <tr><td class="fr">Pouvez-vous répéter, s'il vous plaît ?</td><td class="th">ช่วยพูดซ้ำได้ไหมครับ?</td><td class="note">ทางการ</td></tr>
  <tr><td class="fr">Plus lentement, s'il vous plaît.</td><td class="th">ช้าๆ หน่อยได้ไหม?</td><td class="note">ขอให้พูดช้าลง</td></tr>
  <tr><td class="fr">Parlez-vous anglais ?</td><td class="th">คุณพูดภาษาอังกฤษได้ไหม?</td><td class="note">ทางออกฉุกเฉิน</td></tr>
  <tr><td class="fr">Je ne parle pas bien français.</td><td class="th">ฉันพูดภาษาฝรั่งเศสไม่เก่ง</td><td class="note">พูดตั้งแต่ต้น!</td></tr>
  <tr><td class="fr">Comment dit-on … en français ?</td><td class="th">… ภาษาฝรั่งเศสพูดว่าอะไร?</td><td class="note">ถามคำศัพท์</td></tr>
  <tr><td class="fr">Qu'est-ce que ça veut dire ?</td><td class="th">นี่แปลว่าอะไร?</td><td class="note">ถามความหมาย</td></tr>
  </tbody></table></div>

  <div><p class="sec-head">🆘 ขอความช่วยเหลือ — Demander de l'aide</p>
  <table class="ltable"><thead><tr><th>Phrase</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">Excusez-moi, pouvez-vous m'aider ?</td><td class="th">ขอโทษครับ ช่วยฉันได้ไหม?</td></tr>
  <tr><td class="fr">J'ai besoin d'aide !</td><td class="th">ฉันต้องการความช่วยเหลือ!</td></tr>
  <tr><td class="fr">Au secours !</td><td class="th">ช่วยด้วย! (ฉุกเฉินมาก)</td></tr>
  <tr><td class="fr">Appelez la police, s'il vous plaît !</td><td class="th">ช่วยโทรเรียกตำรวจด้วย!</td></tr>
  <tr><td class="fr">Appelez une ambulance !</td><td class="th">ช่วยเรียกรถพยาบาลด้วย!</td></tr>
  <tr><td class="fr">Je suis perdu(e).</td><td class="th">ฉันหลงทาง</td></tr>
  <tr><td class="fr">J'ai perdu mon passeport.</td><td class="th">ฉันทำหนังสือเดินทางหาย</td></tr>
  <tr><td class="fr">On m'a volé mon sac !</td><td class="th">กระเป๋าของฉันถูกขโมย!</td></tr>
  </tbody></table></div>

  <div class="rule-box"><p class="sec-head">📞 Numéros d'urgence en France — เบอร์ฉุกเฉินในฝรั่งเศส</p>
  <table class="ltable"><thead><tr><th>Numéro</th><th class="thai">บริการ</th><th class="thai">ใช้เมื่อ</th></tr></thead><tbody>
  <tr><td class="fr" style="font-size:18px;font-weight:800;color:#DC2626">15</td><td class="th">SAMU (รถพยาบาล)</td><td class="note">เจ็บป่วย ฉุกเฉินทางการแพทย์</td></tr>
  <tr><td class="fr" style="font-size:18px;font-weight:800;color:#1D4ED8">17</td><td class="th">Police (ตำรวจ)</td><td class="note">อาชญากรรม อุบัติเหตุ</td></tr>
  <tr><td class="fr" style="font-size:18px;font-weight:800;color:#D97706">18</td><td class="th">Pompiers (ดับเพลิง)</td><td class="note">ไฟไหม้ อุบัติเหตุร้ายแรง</td></tr>
  <tr><td class="fr" style="font-size:18px;font-weight:800;color:#059669">112</td><td class="th">Urgences européennes</td><td class="note">เบอร์รวม ใช้ได้ทั่วยุโรป โทรฟรีจากทุกเครือข่าย</td></tr>
  </tbody></table>
  <p class="thai text-[12px] text-blue-800 mt-2">💡 โทร <strong>112</strong> จากโทรศัพท์ไทยในฝรั่งเศสได้เลย! ไม่ต้องมีซิมก็โทรได้!</p></div>

  <div><p class="sec-head">🏥 ที่ร้านขายยา — À la pharmacie</p>
  <table class="ltable"><thead><tr><th>Phrase</th><th class="thai">ความหมาย</th></tr></thead><tbody>
  <tr><td class="fr">J'ai mal à la tête / au ventre / à la gorge.</td><td class="th">ปวดหัว / ปวดท้อง / เจ็บคอ</td></tr>
  <tr><td class="fr">J'ai de la fièvre.</td><td class="th">ฉันมีไข้</td></tr>
  <tr><td class="fr">Je suis allergique à…</td><td class="th">ฉันแพ้…</td></tr>
  <tr><td class="fr">Avez-vous quelque chose contre la douleur ?</td><td class="th">มียาแก้ปวดไหม?</td></tr>

function togglePhase(id) {
    const panel  = document.getElementById(`phase-${id}`);
    const chev   = document.getElementById(`chevron-${id}`);
    if (state.expandedPhases.has(id)) {
        state.expandedPhases.delete(id);
        panel.classList.remove('open');
        chev.classList.remove('open');
    } else {
        state.expandedPhases.add(id);
        panel.classList.add('open');
        chev.classList.add('open');
    }
}
